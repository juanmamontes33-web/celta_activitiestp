<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Tracker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (for JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    /* Hide scrollbar but keep functionality */
    .scrollbar-thin::-webkit-scrollbar { height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // Configuration is stored in browser localStorage - no code editing needed!
    const CONFIG_KEY = 'tt-supabase-config';
    const loadConfig = () => {
      try {
        const stored = localStorage.getItem(CONFIG_KEY);
        return stored ? JSON.parse(stored) : null;
      } catch { return null; }
    };
    const saveConfig = (url, key) => {
      localStorage.setItem(CONFIG_KEY, JSON.stringify({ url, key }));
    };
    const clearConfig = () => {
      localStorage.removeItem(CONFIG_KEY);
    };

    let supabaseClient = null;
    const initSupabase = (url, key) => {
      supabaseClient = window.supabase.createClient(url, key);
      return supabaseClient;
    };
    const _initialConfig = loadConfig();
    if (_initialConfig) initSupabase(_initialConfig.url, _initialConfig.key);

    // ====== ICON COMPONENTS ======
    const Icon = ({ d, size = 16, className = '', strokeWidth = 2 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d}
      </svg>
    );
    const I = {
      Dashboard: (p) => <Icon {...p} d={<><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></>} />,
      Video: (p) => <Icon {...p} d={<><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></>} />,
      Dollar: (p) => <Icon {...p} d={<><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />,
      Plus: (p) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      Trash: (p) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />,
      External: (p) => <Icon {...p} d={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>} />,
      Trend: (p) => <Icon {...p} d={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>} />,
      Users: (p) => <Icon {...p} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      Heart: (p) => <Icon {...p} d={<><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></>} />,
      Calendar: (p) => <Icon {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
      ChevDown: (p) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      ChevLeft: (p) => <Icon {...p} d={<polyline points="15 18 9 12 15 6"/>} />,
      ChevRight: (p) => <Icon {...p} d={<polyline points="9 18 15 12 9 6"/>} />,
      Check: (p) => <Icon {...p} d={<polyline points="20 6 9 17 4 12"/>} />,
      Loader: (p) => <Icon {...p} className={`animate-spin ${p.className || ''}`} d={<line x1="12" y1="2" x2="12" y2="6"/>} />,
      Cloud: (p) => <Icon {...p} d={<path d="M17.5 19a4.5 4.5 0 1 0 0-9c-.21 0-.42.01-.62.04A6.5 6.5 0 0 0 4 12.5C4 16.09 6.91 19 10.5 19h7Z"/>} />,
      CloudOff: (p) => <Icon {...p} d={<><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"/><line x1="1" y1="1" x2="23" y2="23"/></>} />,
      Sparkles: (p) => <Icon {...p} d={<><path d="M12 3l1.9 5.8H20l-4.9 3.6 1.9 5.8L12 14.6l-4.9 3.6 1.9-5.8L4 8.8h6.1L12 3z"/></>} />,
      Edit: (p) => <Icon {...p} d={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>} />,
      Film: (p) => <Icon {...p} d={<><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></>} />,
      Award: (p) => <Icon {...p} d={<><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>} />,
      Logout: (p) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />,
      Mail: (p) => <Icon {...p} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
      Lock: (p) => <Icon {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
      Eye: (p) => <Icon {...p} d={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />,
      Alert: (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />,
    };

    // ====== CONSTANTS ======
    const ACCOUNTS = [
      { id: 'juanxvma', name: 'Juanxvma', label: 'Main Account', url: 'https://www.tiktok.com/@juanxvma', gradient: 'from-pink-500 via-fuchsia-500 to-purple-600' },
      { id: 'montesftbl', name: 'Montesftbl', label: 'Football', url: 'https://www.tiktok.com/@montesftbl', gradient: 'from-blue-500 via-sky-500 to-cyan-500' },
      { id: 'crxnosf1', name: 'Crxnos.f1', label: 'Formula 1', url: 'https://www.tiktok.com/@crxnos.f1', gradient: 'from-red-500 via-orange-500 to-amber-500' },
      { id: 'shelbyftbl', name: 'Shelbyftbl', label: 'Football', url: 'https://www.tiktok.com/@shelbyftbl', gradient: 'from-emerald-500 via-teal-500 to-green-600' },
    ];

    const VIDEO_TYPES = [
      { id: 'campaign', label: 'Campaign', bg: 'bg-violet-100', text: 'text-violet-700', dot: 'bg-violet-500' },
      { id: 'authentic', label: 'Authentic', bg: 'bg-emerald-100', text: 'text-emerald-700', dot: 'bg-emerald-500' },
    ];

    const BONUS_STATUSES = [
      { id: 'pending', label: 'Pending', bg: 'bg-amber-100', text: 'text-amber-700', dot: 'bg-amber-500' },
      { id: 'received', label: 'Received', bg: 'bg-emerald-100', text: 'text-emerald-700', dot: 'bg-emerald-500' },
    ];

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // ====== HELPERS ======
    const formatMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    const parseMonthKey = (key) => { const [y, m] = key.split('-'); return { year: parseInt(y), month: parseInt(m) - 1 }; };
    const formatMonthLabel = (key) => { const { year, month } = parseMonthKey(key); return `${MONTH_NAMES[month]} ${year}`; };
    const todayISO = () => new Date().toISOString().split('T')[0];
    const formatCurrency = (n) => `$${Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const formatNumber = (n) => Number(n || 0).toLocaleString('en-US');

    // ====== SETUP SCREEN ======
    function SetupScreen({ onConfigured }) {
      const [url, setUrl] = useState('');
      const [key, setKey] = useState('');
      const [testing, setTesting] = useState(false);
      const [error, setError] = useState('');

      const submit = async (e) => {
        e.preventDefault();
        setError('');

        // Basic validation
        const trimmedUrl = url.trim().replace(/\/$/, '');
        const trimmedKey = key.trim();

        if (!trimmedUrl.startsWith('https://') || !trimmedUrl.includes('.supabase.co')) {
          setError('That doesn\'t look like a Supabase URL. It should look like: https://abc123.supabase.co');
          return;
        }
        if (trimmedKey.length < 20) {
          setError('That key looks too short. Make sure you copied the whole thing.');
          return;
        }

        setTesting(true);
        try {
          // Test the connection
          const testClient = window.supabase.createClient(trimmedUrl, trimmedKey);
          const { error: testError } = await testClient.from('videos').select('id').limit(1);
          if (testError && !testError.message.includes('JWT') && testError.code !== 'PGRST301') {
            // PGRST301 = RLS blocking, which is expected without login - means connection works
            if (testError.message.includes('relation') || testError.message.includes('does not exist')) {
              throw new Error('Connected to Supabase, but the database tables are missing. Did you run the SQL from supabase-schema.sql?');
            }
            throw new Error(testError.message);
          }
          // Success! Save and load.
          saveConfig(trimmedUrl, trimmedKey);
          initSupabase(trimmedUrl, trimmedKey);
          onConfigured();
        } catch (err) {
          setError(err.message || 'Could not connect. Double-check your URL and key.');
        } finally {
          setTesting(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-50 via-fuchsia-50 to-purple-100 p-4">
          <div className="w-full max-w-lg">
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-pink-500 via-fuchsia-500 to-purple-600 shadow-xl shadow-pink-500/30 mb-4">
                <I.Sparkles size={28} className="text-white" />
              </div>
              <h1 className="text-3xl font-bold text-slate-900">Welcome, Juan!</h1>
              <p className="text-slate-600 mt-1">Let's connect your database. One-time setup.</p>
            </div>

            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 sm:p-8">
              <form onSubmit={submit} className="space-y-5">
                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">
                    1. Your Supabase Project URL
                  </label>
                  <input
                    type="url"
                    value={url}
                    onChange={(e) => setUrl(e.target.value)}
                    required
                    placeholder="https://abc123.supabase.co"
                    className="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition text-sm font-mono"
                  />
                  <p className="text-xs text-slate-500 mt-1.5">
                    Find it in Supabase: <span className="font-semibold">Project Settings → Data API → Project URL</span>
                  </p>
                </div>

                <div>
                  <label className="block text-sm font-semibold text-slate-700 mb-1.5">
                    2. Your Publishable Key
                  </label>
                  <input
                    type="text"
                    value={key}
                    onChange={(e) => setKey(e.target.value)}
                    required
                    placeholder="sb_publishable_..."
                    className="w-full px-3 py-2.5 border border-slate-200 rounded-lg focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition text-sm font-mono"
                  />
                  <p className="text-xs text-slate-500 mt-1.5">
                    Find it in Supabase: <span className="font-semibold">Project Settings → API Keys → Publishable key</span>
                  </p>
                  <p className="text-xs text-amber-600 mt-1 flex items-start gap-1">
                    <I.Alert size={12} className="mt-0.5 shrink-0" />
                    <span>Use the <span className="font-semibold">publishable</span> key, NOT the secret key!</span>
                  </p>
                </div>

                {error && (
                  <div className="bg-red-50 border border-red-200 text-red-700 px-3 py-2.5 rounded-lg text-sm flex items-start gap-2">
                    <I.Alert size={16} className="mt-0.5 shrink-0" />
                    <span>{error}</span>
                  </div>
                )}

                <button
                  type="submit"
                  disabled={testing}
                  className="w-full py-3 bg-gradient-to-r from-pink-500 via-fuchsia-500 to-purple-600 text-white font-semibold rounded-lg shadow-md hover:shadow-lg hover:opacity-95 disabled:opacity-50 transition-all flex items-center justify-center gap-2"
                >
                  {testing ? (
                    <>
                      <I.Loader size={16} />
                      Testing connection...
                    </>
                  ) : (
                    <>
                      <I.Cloud size={16} />
                      Connect to my database
                    </>
                  )}
                </button>
              </form>

              <div className="mt-6 pt-5 border-t border-slate-100">
                <p className="text-xs text-slate-500 text-center">
                  Your credentials are stored only in this browser. They never leave your device.
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ====== AUTH SCREEN ======
    function AuthScreen({ onAuth, onResetConfig }) {
      const [mode, setMode] = useState('signin');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPwd, setShowPwd] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [info, setInfo] = useState('');

      const submit = async (e) => {
        e.preventDefault();
        setError(''); setInfo(''); setLoading(true);
        try {
          if (mode === 'signup') {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user && !data.session) {
              setInfo('Account created. Check your email to confirm, then sign in.');
              setMode('signin');
            } else {
              onAuth(data.session);
            }
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            onAuth(data.session);
          }
        } catch (err) {
          setError(err.message || 'Something went wrong');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-50 via-fuchsia-50 to-purple-100 p-4">
          <div className="w-full max-w-md">
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-pink-500 via-fuchsia-500 to-purple-600 shadow-xl shadow-pink-500/30 mb-4">
                <I.Sparkles size={28} className="text-white" />
              </div>
              <h1 className="text-3xl font-bold text-slate-900">TikTok Tracker</h1>
              <p className="text-slate-600 mt-1">Your content dashboard</p>
            </div>

            <div className="bg-white rounded-2xl shadow-xl border border-slate-200 p-6 sm:p-8">
              <div className="flex gap-2 mb-6 bg-slate-100 rounded-lg p-1">
                <button
                  type="button"
                  onClick={() => { setMode('signin'); setError(''); setInfo(''); }}
                  className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all ${mode === 'signin' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600'}`}
                >Sign in</button>
                <button
                  type="button"
                  onClick={() => { setMode('signup'); setError(''); setInfo(''); }}
                  className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all ${mode === 'signup' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600'}`}
                >Sign up</button>
              </div>

              <form onSubmit={submit} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                  <div className="relative">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                      <I.Mail size={16} />
                    </div>
                    <input
                      type="email"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                      required
                      placeholder="you@example.com"
                      className="w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-lg focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition"
                    />
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                  <div className="relative">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                      <I.Lock size={16} />
                    </div>
                    <input
                      type={showPwd ? 'text' : 'password'}
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      required
                      minLength={6}
                      placeholder="At least 6 characters"
                      className="w-full pl-10 pr-10 py-2.5 border border-slate-200 rounded-lg focus:border-pink-400 focus:ring-2 focus:ring-pink-100 outline-none transition"
                    />
                    <button
                      type="button"
                      onClick={() => setShowPwd(!showPwd)}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
                    >
                      <I.Eye size={16} />
                    </button>
                  </div>
                </div>

                {error && (
                  <div className="bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-lg text-sm">
                    {error}
                  </div>
                )}
                {info && (
                  <div className="bg-blue-50 border border-blue-200 text-blue-700 px-3 py-2 rounded-lg text-sm">
                    {info}
                  </div>
                )}

                <button
                  type="submit"
                  disabled={loading}
                  className="w-full py-2.5 bg-gradient-to-r from-pink-500 via-fuchsia-500 to-purple-600 text-white font-semibold rounded-lg shadow-md hover:shadow-lg hover:opacity-95 disabled:opacity-50 transition-all flex items-center justify-center gap-2"
                >
                  {loading ? <I.Loader size={16} /> : null}
                  {mode === 'signup' ? 'Create account' : 'Sign in'}
                </button>
              </form>

              <p className="text-xs text-slate-500 mt-6 text-center">
                {mode === 'signup' ? 'Your data is private and stored securely in your own Supabase database.' : 'Welcome back, Juan'}
              </p>
            </div>

            <div className="text-center mt-4">
              <button
                onClick={onResetConfig}
                className="text-xs text-slate-400 hover:text-slate-600 underline"
              >
                Wrong project? Reset connection settings
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ====== MAIN TRACKER ======
    function Tracker({ session, onSignOut }) {
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [synced, setSynced] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [currentMonth, setCurrentMonth] = useState(formatMonthKey(new Date()));

      // videos[accountId][monthKey] = [{ id, link, date, type }]
      const [videos, setVideos] = useState({});
      // bonuses = [{ id, date, amount, status, note }]
      const [bonuses, setBonuses] = useState([]);
      // accountStats[accountId][monthKey] = { followers, likes }
      const [accountStats, setAccountStats] = useState({});

      const [openMenu, setOpenMenu] = useState(null);
      const [editingStat, setEditingStat] = useState(null);

      const userId = session.user.id;

      // Load all data
      useEffect(() => {
        (async () => {
          try {
            const [videosRes, bonusesRes, statsRes] = await Promise.all([
              supabaseClient.from('videos').select('*').order('created_at', { ascending: true }),
              supabaseClient.from('bonuses').select('*').order('created_at', { ascending: false }),
              supabaseClient.from('account_stats').select('*'),
            ]);

            // Group videos by account and month
            const videoMap = {};
            (videosRes.data || []).forEach(v => {
              if (!videoMap[v.account_id]) videoMap[v.account_id] = {};
              if (!videoMap[v.account_id][v.month]) videoMap[v.account_id][v.month] = [];
              videoMap[v.account_id][v.month].push({
                id: v.id, link: v.link || '', date: v.date, type: v.type
              });
            });
            setVideos(videoMap);

            setBonuses((bonusesRes.data || []).map(b => ({
              id: b.id, date: b.date, amount: b.amount, status: b.status, note: b.note || ''
            })));

            const statsMap = {};
            (statsRes.data || []).forEach(s => {
              if (!statsMap[s.account_id]) statsMap[s.account_id] = {};
              statsMap[s.account_id][s.month] = { followers: s.followers, likes: s.likes };
            });
            setAccountStats(statsMap);
          } catch (err) {
            console.error('Load error:', err);
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      useEffect(() => {
        const handler = () => setOpenMenu(null);
        if (openMenu) {
          document.addEventListener('click', handler);
          return () => document.removeEventListener('click', handler);
        }
      }, [openMenu]);

      const withSync = async (fn) => {
        setSyncing(true);
        setSynced(false);
        try {
          await fn();
          setSynced(true);
        } catch (err) {
          console.error('Sync error:', err);
          setSynced(false);
        } finally {
          setSyncing(false);
        }
      };

      // ====== VIDEO OPERATIONS ======
      const addVideo = (accountId) => {
        withSync(async () => {
          const newVideo = { user_id: userId, account_id: accountId, month: currentMonth, link: '', date: todayISO(), type: 'authentic' };
          const { data, error } = await supabaseClient.from('videos').insert(newVideo).select().single();
          if (error) throw error;
          const updated = { ...videos };
          if (!updated[accountId]) updated[accountId] = {};
          if (!updated[accountId][currentMonth]) updated[accountId][currentMonth] = [];
          updated[accountId][currentMonth] = [...updated[accountId][currentMonth], { id: data.id, link: data.link, date: data.date, type: data.type }];
          setVideos(updated);
        });
      };

      const updateVideo = (accountId, monthKey, videoId, field, value) => {
        // Optimistic update
        const updated = { ...videos };
        updated[accountId][monthKey] = updated[accountId][monthKey].map(v => v.id === videoId ? { ...v, [field]: value } : v);
        setVideos(updated);
        // Sync
        withSync(async () => {
          const { error } = await supabaseClient.from('videos').update({ [field]: value }).eq('id', videoId);
          if (error) throw error;
        });
      };

      const deleteVideo = (accountId, monthKey, videoId) => {
        const updated = { ...videos };
        updated[accountId][monthKey] = updated[accountId][monthKey].filter(v => v.id !== videoId);
        setVideos(updated);
        withSync(async () => {
          const { error } = await supabaseClient.from('videos').delete().eq('id', videoId);
          if (error) throw error;
        });
      };

      // ====== BONUS OPERATIONS ======
      const addBonus = () => {
        withSync(async () => {
          const newBonus = { user_id: userId, date: todayISO(), amount: 0, status: 'pending', note: '' };
          const { data, error } = await supabaseClient.from('bonuses').insert(newBonus).select().single();
          if (error) throw error;
          setBonuses([{ id: data.id, date: data.date, amount: data.amount, status: data.status, note: data.note || '' }, ...bonuses]);
        });
      };

      const updateBonus = (bonusId, field, value) => {
        setBonuses(bonuses.map(b => b.id === bonusId ? { ...b, [field]: value } : b));
        withSync(async () => {
          const { error } = await supabaseClient.from('bonuses').update({ [field]: value }).eq('id', bonusId);
          if (error) throw error;
        });
      };

      const deleteBonus = (bonusId) => {
        setBonuses(bonuses.filter(b => b.id !== bonusId));
        withSync(async () => {
          const { error } = await supabaseClient.from('bonuses').delete().eq('id', bonusId);
          if (error) throw error;
        });
      };

      // ====== STAT OPERATIONS ======
      const updateAccountStat = (accountId, monthKey, field, value) => {
        const numValue = Number(value) || 0;
        const updated = { ...accountStats };
        if (!updated[accountId]) updated[accountId] = {};
        if (!updated[accountId][monthKey]) updated[accountId][monthKey] = { followers: 0, likes: 0 };
        updated[accountId][monthKey] = { ...updated[accountId][monthKey], [field]: numValue };
        setAccountStats(updated);

        withSync(async () => {
          const current = updated[accountId][monthKey];
          const { error } = await supabaseClient.from('account_stats').upsert({
            user_id: userId,
            account_id: accountId,
            month: monthKey,
            followers: current.followers,
            likes: current.likes,
          }, { onConflict: 'user_id,account_id,month' });
          if (error) throw error;
        });
      };

      // ====== COUNTERS ======
      const getMonthVideos = (accountId, monthKey) => videos[accountId]?.[monthKey] || [];
      const countMonthVideos = (accountId, monthKey) => getMonthVideos(accountId, monthKey).filter(v => v.link.trim()).length;
      const countAllTimeVideos = (accountId) => {
        if (!videos[accountId]) return 0;
        return Object.values(videos[accountId]).reduce((sum, arr) => sum + arr.filter(v => v.link.trim()).length, 0);
      };
      const countTotalThisMonth = () => ACCOUNTS.reduce((s, a) => s + countMonthVideos(a.id, currentMonth), 0);
      const countGrandTotal = () => ACCOUNTS.reduce((s, a) => s + countAllTimeVideos(a.id), 0);
      const getStats = (accountId, monthKey) => accountStats[accountId]?.[monthKey] || { followers: 0, likes: 0 };

      const totalEarned = bonuses.reduce((s, b) => s + Number(b.amount || 0), 0);
      const totalReceived = bonuses.filter(b => b.status === 'received').reduce((s, b) => s + Number(b.amount || 0), 0);
      const totalPending = bonuses.filter(b => b.status === 'pending').reduce((s, b) => s + Number(b.amount || 0), 0);
      const monthBonuses = bonuses.filter(b => b.date && b.date.startsWith(currentMonth));
      const monthBonusTotal = monthBonuses.reduce((s, b) => s + Number(b.amount || 0), 0);

      const goPrevMonth = () => { const { year, month } = parseMonthKey(currentMonth); setCurrentMonth(formatMonthKey(new Date(year, month - 1, 1))); };
      const goNextMonth = () => { const { year, month } = parseMonthKey(currentMonth); setCurrentMonth(formatMonthKey(new Date(year, month + 1, 1))); };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100">
            <div className="text-center">
              <I.Loader size={48} className="text-pink-500 mx-auto mb-4" />
              <p className="text-slate-600 font-medium">Loading your data from the cloud...</p>
            </div>
          </div>
        );
      }

      const activeAccount = ACCOUNTS.find(a => a.id === activeTab);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-slate-100 text-slate-800">
          {/* Header */}
          <div className="bg-white border-b border-slate-200 sticky top-0 z-30">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4">
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-pink-500 via-fuchsia-500 to-purple-600 flex items-center justify-center shadow-lg shadow-pink-500/20">
                    <I.Sparkles size={20} className="text-white" />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight">TikTok Tracker</h1>
                    <p className="text-xs text-slate-500">{session.user.email}</p>
                  </div>
                </div>
                <div className="flex items-center gap-2 text-xs">
                  {syncing ? (
                    <span className="flex items-center gap-1.5 text-amber-600 bg-amber-50 px-3 py-1.5 rounded-full font-medium">
                      <I.Loader size={14} /> Syncing
                    </span>
                  ) : synced ? (
                    <span className="flex items-center gap-1.5 text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full font-medium">
                      <I.Cloud size={14} /> Synced
                    </span>
                  ) : (
                    <span className="flex items-center gap-1.5 text-red-600 bg-red-50 px-3 py-1.5 rounded-full font-medium">
                      <I.CloudOff size={14} /> Issue
                    </span>
                  )}
                  <button
                    onClick={onSignOut}
                    className="flex items-center gap-1.5 text-slate-600 hover:text-slate-900 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-full font-medium transition"
                    title="Sign out"
                  >
                    <I.Logout size={14} /> Sign out
                  </button>
                </div>
              </div>

              <div className="flex items-center gap-1 mt-4 overflow-x-auto scrollbar-thin pb-1 -mx-1 px-1">
                <TabButton active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<I.Dashboard size={16} />} label="Dashboard" />
                {ACCOUNTS.map(acc => (
                  <TabButton
                    key={acc.id}
                    active={activeTab === acc.id}
                    onClick={() => setActiveTab(acc.id)}
                    icon={<div className={`w-2.5 h-2.5 rounded-full bg-gradient-to-br ${acc.gradient}`} />}
                    label={acc.name}
                  />
                ))}
                <TabButton active={activeTab === 'bonuses'} onClick={() => setActiveTab('bonuses')} icon={<I.Dollar size={16} />} label="Bonuses" />
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
            {activeTab === 'dashboard' && (
              <DashboardView
                currentMonth={currentMonth}
                onPrevMonth={goPrevMonth}
                onNextMonth={goNextMonth}
                countMonthVideos={countMonthVideos}
                countAllTimeVideos={countAllTimeVideos}
                countTotalThisMonth={countTotalThisMonth}
                countGrandTotal={countGrandTotal}
                getStats={getStats}
                totalEarned={totalEarned}
                totalReceived={totalReceived}
                totalPending={totalPending}
                monthBonusTotal={monthBonusTotal}
                setActiveTab={setActiveTab}
              />
            )}

            {activeAccount && (
              <AccountView
                account={activeAccount}
                currentMonth={currentMonth}
                onPrevMonth={goPrevMonth}
                onNextMonth={goNextMonth}
                videos={getMonthVideos(activeAccount.id, currentMonth)}
                stats={getStats(activeAccount.id, currentMonth)}
                allTimeCount={countAllTimeVideos(activeAccount.id)}
                monthCount={countMonthVideos(activeAccount.id, currentMonth)}
                onAddVideo={() => addVideo(activeAccount.id)}
                onUpdateVideo={(id, field, value) => updateVideo(activeAccount.id, currentMonth, id, field, value)}
                onDeleteVideo={(id) => deleteVideo(activeAccount.id, currentMonth, id)}
                onUpdateStat={(field, value) => updateAccountStat(activeAccount.id, currentMonth, field, value)}
                openMenu={openMenu}
                setOpenMenu={setOpenMenu}
                editingStat={editingStat}
                setEditingStat={setEditingStat}
              />
            )}

            {activeTab === 'bonuses' && (
              <BonusesView
                bonuses={bonuses}
                currentMonth={currentMonth}
                totalEarned={totalEarned}
                totalReceived={totalReceived}
                totalPending={totalPending}
                monthBonusTotal={monthBonusTotal}
                monthBonusCount={monthBonuses.length}
                onAdd={addBonus}
                onUpdate={updateBonus}
                onDelete={deleteBonus}
                openMenu={openMenu}
                setOpenMenu={setOpenMenu}
              />
            )}
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 pb-8 text-center">
            <p className="text-xs text-slate-400">Your data syncs to the cloud automatically · Sign in from any device</p>
          </div>
        </div>
      );
    }

    function TabButton({ active, onClick, icon, label }) {
      return (
        <button
          onClick={onClick}
          className={`flex items-center gap-2 px-3.5 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all ${active ? 'bg-slate-900 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'}`}
        >
          {icon}{label}
        </button>
      );
    }

    function MonthSelector({ currentMonth, onPrev, onNext, theme = 'light' }) {
      const themeClasses = theme === 'dark'
        ? 'bg-white/20 backdrop-blur-sm border-white/30 text-white'
        : 'bg-white border-slate-200 text-slate-700';
      return (
        <div className={`inline-flex items-center gap-1 border rounded-lg p-1 shadow-sm ${themeClasses}`}>
          <button onClick={onPrev} className="p-1.5 hover:bg-black/10 rounded-md transition-colors" aria-label="Previous month">
            <I.ChevLeft size={16} />
          </button>
          <div className="px-3 py-1 flex items-center gap-2 min-w-[160px] justify-center">
            <I.Calendar size={16} />
            <span className="text-sm font-semibold">{formatMonthLabel(currentMonth)}</span>
          </div>
          <button onClick={onNext} className="p-1.5 hover:bg-black/10 rounded-md transition-colors" aria-label="Next month">
            <I.ChevRight size={16} />
          </button>
        </div>
      );
    }

    function StatCard({ label, value, icon, gradient, subtitle }) {
      return (
        <div className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow">
          <div className="flex items-start justify-between mb-3">
            <span className="text-xs font-medium text-slate-500 uppercase tracking-wide">{label}</span>
            <div className={`w-8 h-8 rounded-lg bg-gradient-to-br ${gradient} flex items-center justify-center text-white shadow-sm`}>{icon}</div>
          </div>
          <div className="text-2xl font-bold text-slate-900">{value}</div>
          {subtitle && <div className="text-xs text-slate-500 mt-1">{subtitle}</div>}
        </div>
      );
    }

    function DashboardView({ currentMonth, onPrevMonth, onNextMonth, countMonthVideos, countAllTimeVideos, countTotalThisMonth, countGrandTotal, getStats, totalEarned, totalReceived, totalPending, monthBonusTotal, setActiveTab }) {
      const totalFollowers = ACCOUNTS.reduce((s, a) => s + getStats(a.id, currentMonth).followers, 0);
      const totalLikes = ACCOUNTS.reduce((s, a) => s + getStats(a.id, currentMonth).likes, 0);
      const monthTotal = countTotalThisMonth();
      const maxMonthVideos = Math.max(1, ...ACCOUNTS.map(a => countMonthVideos(a.id, currentMonth)));

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-2xl font-bold tracking-tight">Overview</h2>
              <p className="text-sm text-slate-500 mt-0.5">Your content across all 4 accounts</p>
            </div>
            <MonthSelector currentMonth={currentMonth} onPrev={onPrevMonth} onNext={onNextMonth} />
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Videos this month" value={monthTotal} icon={<I.Film size={16} />} gradient="from-pink-500 to-fuchsia-500" subtitle="Across all 4 accounts" />
            <StatCard label="All-time videos" value={countGrandTotal()} icon={<I.Video size={16} />} gradient="from-blue-500 to-cyan-500" subtitle="Total production" />
            <StatCard label="Followers (month)" value={formatNumber(totalFollowers)} icon={<I.Users size={16} />} gradient="from-violet-500 to-purple-600" subtitle="Combined reach" />
            <StatCard label="Likes (month)" value={formatNumber(totalLikes)} icon={<I.Heart size={16} />} gradient="from-rose-500 to-red-500" subtitle="Total engagement" />
          </div>

          <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-slate-900 flex items-center gap-2"><I.Trend size={16} className="text-pink-500" />Videos by account</h3>
              <span className="text-xs text-slate-500">{formatMonthLabel(currentMonth)}</span>
            </div>
            <div className="space-y-4">
              {ACCOUNTS.map(acc => {
                const count = countMonthVideos(acc.id, currentMonth);
                const total = countAllTimeVideos(acc.id);
                const pct = (count / maxMonthVideos) * 100;
                const stats = getStats(acc.id, currentMonth);
                return (
                  <button key={acc.id} onClick={() => setActiveTab(acc.id)} className="w-full text-left group">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2.5">
                        <div className={`w-3 h-3 rounded-full bg-gradient-to-br ${acc.gradient}`} />
                        <span className="font-semibold text-sm">{acc.name}</span>
                        <span className="text-xs text-slate-500">· {acc.label}</span>
                      </div>
                      <div className="flex items-center gap-3 text-xs">
                        <span className="text-slate-500 hidden sm:inline-flex items-center gap-1"><I.Users size={12} />{formatNumber(stats.followers)}</span>
                        <span className="text-slate-500 hidden sm:inline-flex items-center gap-1"><I.Heart size={12} />{formatNumber(stats.likes)}</span>
                        <span className="font-bold text-slate-900 min-w-[40px] text-right">{count} <span className="text-slate-400 font-normal">/ {total}</span></span>
                      </div>
                    </div>
                    <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                      <div className={`h-full bg-gradient-to-r ${acc.gradient} transition-all duration-500 group-hover:opacity-90`} style={{ width: `${pct}%` }} />
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-slate-900 flex items-center gap-2"><I.Award size={16} className="text-amber-500" />Bonuses summary</h3>
              <button onClick={() => setActiveTab('bonuses')} className="text-xs font-medium text-pink-600 hover:text-pink-700 flex items-center gap-1">Manage <I.ChevRight size={12} /></button>
            </div>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-lg p-3 border border-slate-200">
                <div className="text-xs text-slate-500 font-medium mb-1">Total earned</div>
                <div className="text-lg font-bold text-slate-900">{formatCurrency(totalEarned)}</div>
              </div>
              <div className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-lg p-3 border border-emerald-200">
                <div className="text-xs text-emerald-700 font-medium mb-1">Received</div>
                <div className="text-lg font-bold text-emerald-700">{formatCurrency(totalReceived)}</div>
              </div>
              <div className="bg-gradient-to-br from-amber-50 to-orange-50 rounded-lg p-3 border border-amber-200">
                <div className="text-xs text-amber-700 font-medium mb-1">Pending</div>
                <div className="text-lg font-bold text-amber-700">{formatCurrency(totalPending)}</div>
              </div>
              <div className="bg-gradient-to-br from-pink-50 to-fuchsia-50 rounded-lg p-3 border border-pink-200">
                <div className="text-xs text-pink-700 font-medium mb-1">This month</div>
                <div className="text-lg font-bold text-pink-700">{formatCurrency(monthBonusTotal)}</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AccountView({ account, currentMonth, onPrevMonth, onNextMonth, videos, stats, allTimeCount, monthCount, onAddVideo, onUpdateVideo, onDeleteVideo, onUpdateStat, openMenu, setOpenMenu, editingStat, setEditingStat }) {
      const campaignCount = videos.filter(v => v.link.trim() && v.type === 'campaign').length;
      const authenticCount = videos.filter(v => v.link.trim() && v.type === 'authentic').length;

      return (
        <div className="space-y-6">
          <div className={`relative overflow-hidden rounded-2xl bg-gradient-to-br ${account.gradient} p-6 text-white shadow-lg`}>
            <div className="relative z-10 flex items-start justify-between flex-wrap gap-4">
              <div>
                <div className="text-xs uppercase tracking-widest opacity-80 mb-1">{account.label}</div>
                <h2 className="text-3xl font-bold mb-2">@{account.name}</h2>
                <a href={account.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-sm bg-white/20 hover:bg-white/30 backdrop-blur-sm px-3 py-1.5 rounded-full transition-colors">
                  View on TikTok <I.External size={12} />
                </a>
              </div>
              <MonthSelector currentMonth={currentMonth} onPrev={onPrevMonth} onNext={onNextMonth} theme="dark" />
            </div>
            <div className="absolute -right-8 -top-8 w-40 h-40 bg-white/10 rounded-full" />
            <div className="absolute -right-16 -bottom-16 w-48 h-48 bg-white/5 rounded-full" />
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="This month" value={monthCount} icon={<I.Calendar size={16} />} gradient={account.gradient} subtitle="Videos posted" />
            <StatCard label="All time" value={allTimeCount} icon={<I.Film size={16} />} gradient="from-slate-700 to-slate-900" subtitle="Lifetime total" />
            <EditableStatCard label="Followers" value={stats.followers} icon={<I.Users size={16} />} gradient="from-violet-500 to-purple-600" subtitle="This month" editing={editingStat === 'followers'} onEditStart={() => setEditingStat('followers')} onEditEnd={() => setEditingStat(null)} onSave={(v) => onUpdateStat('followers', v)} />
            <EditableStatCard label="Likes" value={stats.likes} icon={<I.Heart size={16} />} gradient="from-rose-500 to-red-500" subtitle="This month" editing={editingStat === 'likes'} onEditStart={() => setEditingStat('likes')} onEditEnd={() => setEditingStat(null)} onSave={(v) => onUpdateStat('likes', v)} />
          </div>

          <div className="flex gap-3 flex-wrap">
            <div className="flex items-center gap-2 bg-violet-50 border border-violet-200 px-3 py-1.5 rounded-lg">
              <div className="w-2 h-2 rounded-full bg-violet-500" />
              <span className="text-sm text-violet-700"><span className="font-bold">{campaignCount}</span> Campaign</span>
            </div>
            <div className="flex items-center gap-2 bg-emerald-50 border border-emerald-200 px-3 py-1.5 rounded-lg">
              <div className="w-2 h-2 rounded-full bg-emerald-500" />
              <span className="text-sm text-emerald-700"><span className="font-bold">{authenticCount}</span> Authentic</span>
            </div>
          </div>

          <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
              <h3 className="font-bold text-slate-900">Videos · {formatMonthLabel(currentMonth)}</h3>
              <span className="text-xs text-slate-500">{videos.length} {videos.length === 1 ? 'entry' : 'entries'}</span>
            </div>

            <div className="hidden md:grid grid-cols-[1fr_140px_140px_40px] gap-3 px-5 py-2.5 bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-500 uppercase tracking-wide">
              <div>Video link</div><div>Date</div><div>Type</div><div></div>
            </div>

            {videos.length === 0 ? (
              <div className="px-5 py-12 text-center">
                <div className={`inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br ${account.gradient} opacity-30 mb-3`}>
                  <I.Video size={28} className="text-white" />
                </div>
                <p className="text-slate-600 font-medium mb-1">No videos yet for this month</p>
                <p className="text-sm text-slate-500">Click below to add your first video</p>
              </div>
            ) : (
              <div className="divide-y divide-slate-100">
                {videos.map(video => (
                  <VideoRow key={video.id} video={video} onUpdate={(field, value) => onUpdateVideo(video.id, field, value)} onDelete={() => onDeleteVideo(video.id)} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                ))}
              </div>
            )}

            <button onClick={onAddVideo} className="w-full px-5 py-3.5 flex items-center justify-center gap-2 text-sm font-medium text-slate-600 hover:bg-slate-50 border-t border-slate-100 transition-colors">
              <I.Plus size={16} /> New video
            </button>
          </div>
        </div>
      );
    }

    function VideoRow({ video, onUpdate, onDelete, openMenu, setOpenMenu }) {
      const menuId = `video-type-${video.id}`;
      const isMenuOpen = openMenu === menuId;
      const type = VIDEO_TYPES.find(t => t.id === video.type) || VIDEO_TYPES[1];
      const [localLink, setLocalLink] = useState(video.link);
      const [localDate, setLocalDate] = useState(video.date);

      useEffect(() => { setLocalLink(video.link); }, [video.link]);
      useEffect(() => { setLocalDate(video.date); }, [video.date]);

      return (
        <div className="grid grid-cols-1 md:grid-cols-[1fr_140px_140px_40px] gap-2 md:gap-3 px-5 py-3 hover:bg-slate-50 transition-colors group">
          <div className="flex items-center gap-2">
            <input type="url" value={localLink} onChange={(e) => setLocalLink(e.target.value)} onBlur={() => localLink !== video.link && onUpdate('link', localLink)} placeholder="Paste TikTok video URL..."
              className="flex-1 min-w-0 px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-slate-200 focus:border-pink-300 focus:bg-white rounded-md outline-none focus:ring-2 focus:ring-pink-100 transition-all" />
            {localLink.trim() && (
              <a href={localLink} target="_blank" rel="noopener noreferrer" className="p-1.5 text-slate-400 hover:text-pink-500 transition-colors">
                <I.External size={14} />
              </a>
            )}
          </div>

          <input type="date" value={localDate} onChange={(e) => { setLocalDate(e.target.value); onUpdate('date', e.target.value); }}
            className="px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-slate-200 focus:border-pink-300 focus:bg-white rounded-md outline-none focus:ring-2 focus:ring-pink-100 transition-all" />

          <div className="relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={() => setOpenMenu(isMenuOpen ? null : menuId)} className={`w-full flex items-center justify-between gap-1.5 px-2.5 py-1.5 rounded-md text-sm font-medium transition-colors ${type.bg} ${type.text} hover:opacity-80`}>
              <span className="flex items-center gap-1.5"><div className={`w-1.5 h-1.5 rounded-full ${type.dot}`} />{type.label}</span>
              <I.ChevDown size={14} className="opacity-60" />
            </button>
            {isMenuOpen && (
              <div className="absolute z-20 top-full mt-1 left-0 right-0 min-w-[140px] bg-white border border-slate-200 rounded-lg shadow-lg py-1 overflow-hidden">
                {VIDEO_TYPES.map(t => (
                  <button key={t.id} onClick={() => { onUpdate('type', t.id); setOpenMenu(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-slate-50 transition-colors">
                    <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded ${t.bg} ${t.text} text-xs font-medium`}>
                      <div className={`w-1.5 h-1.5 rounded-full ${t.dot}`} />{t.label}
                    </div>
                    {video.type === t.id && <I.Check size={14} className="text-slate-400 ml-auto" />}
                  </button>
                ))}
              </div>
            )}
          </div>

          <button onClick={onDelete} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors opacity-0 group-hover:opacity-100 md:justify-self-end self-center" aria-label="Delete video">
            <I.Trash size={16} />
          </button>
        </div>
      );
    }

    function EditableStatCard({ label, value, icon, gradient, subtitle, editing, onEditStart, onEditEnd, onSave }) {
      const [draft, setDraft] = useState(value);
      const inputRef = useRef(null);
      useEffect(() => { if (editing) { setDraft(value); setTimeout(() => inputRef.current?.select(), 0); } }, [editing, value]);
      const commit = () => { onSave(draft); onEditEnd(); };

      return (
        <div className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow group">
          <div className="flex items-start justify-between mb-3">
            <span className="text-xs font-medium text-slate-500 uppercase tracking-wide">{label}</span>
            <div className={`w-8 h-8 rounded-lg bg-gradient-to-br ${gradient} flex items-center justify-center text-white shadow-sm`}>{icon}</div>
          </div>
          {editing ? (
            <input ref={inputRef} type="number" value={draft} onChange={(e) => setDraft(e.target.value)} onBlur={commit} onKeyDown={(e) => { if (e.key === 'Enter') commit(); if (e.key === 'Escape') onEditEnd(); }}
              className="w-full text-2xl font-bold text-slate-900 bg-slate-50 border border-pink-300 rounded-md px-2 py-0.5 outline-none focus:ring-2 focus:ring-pink-100" />
          ) : (
            <button onClick={onEditStart} className="text-2xl font-bold text-slate-900 hover:text-pink-600 transition-colors flex items-center gap-1.5">
              {formatNumber(value)}
              <I.Edit size={12} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity" />
            </button>
          )}
          {subtitle && <div className="text-xs text-slate-500 mt-1">{subtitle}</div>}
        </div>
      );
    }

    function BonusesView({ bonuses, currentMonth, totalEarned, totalReceived, totalPending, monthBonusTotal, monthBonusCount, onAdd, onUpdate, onDelete, openMenu, setOpenMenu }) {
      const receivedPct = totalEarned > 0 ? (totalReceived / totalEarned) * 100 : 0;

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-2xl font-bold tracking-tight flex items-center gap-2"><I.Award size={24} className="text-amber-500" />Bonuses</h2>
              <p className="text-sm text-slate-500 mt-0.5">Track all your TikTok bonus payments</p>
            </div>
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Total earned" value={formatCurrency(totalEarned)} icon={<I.Dollar size={16} />} gradient="from-slate-700 to-slate-900" subtitle={`${bonuses.length} ${bonuses.length === 1 ? 'bonus' : 'bonuses'}`} />
            <StatCard label="Received" value={formatCurrency(totalReceived)} icon={<I.Check size={16} />} gradient="from-emerald-500 to-teal-500" subtitle="Already paid" />
            <StatCard label="Pending" value={formatCurrency(totalPending)} icon={<I.Loader size={16} />} gradient="from-amber-500 to-orange-500" subtitle="Awaiting payment" />
            <StatCard label={formatMonthLabel(currentMonth)} value={formatCurrency(monthBonusTotal)} icon={<I.Calendar size={16} />} gradient="from-pink-500 to-fuchsia-500" subtitle={`${monthBonusCount} this month`} />
          </div>

          {totalEarned > 0 && (
            <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm font-semibold text-slate-700">Payment progress</span>
                <span className="text-sm text-slate-500">{receivedPct.toFixed(1)}% received</span>
              </div>
              <div className="h-3 bg-slate-100 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-teal-500 transition-all duration-500" style={{ width: `${receivedPct}%` }} />
              </div>
              <div className="flex justify-between mt-2 text-xs text-slate-500">
                <span>{formatCurrency(totalReceived)} received</span>
                <span>{formatCurrency(totalPending)} pending</span>
              </div>
            </div>
          )}

          <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
            <div className="px-5 py-4 border-b border-slate-200"><h3 className="font-bold text-slate-900">All bonuses</h3></div>

            <div className="hidden md:grid grid-cols-[140px_140px_1fr_140px_40px] gap-3 px-5 py-2.5 bg-slate-50 border-b border-slate-200 text-xs font-semibold text-slate-500 uppercase tracking-wide">
              <div>Date received</div><div>Amount</div><div>Note</div><div>Status</div><div></div>
            </div>

            {bonuses.length === 0 ? (
              <div className="px-5 py-12 text-center">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 opacity-30 mb-3">
                  <I.Award size={28} className="text-white" />
                </div>
                <p className="text-slate-600 font-medium mb-1">No bonuses yet</p>
                <p className="text-sm text-slate-500">Click below to add your first bonus</p>
              </div>
            ) : (
              <div className="divide-y divide-slate-100">
                {bonuses.map(bonus => (
                  <BonusRow key={bonus.id} bonus={bonus} onUpdate={(field, value) => onUpdate(bonus.id, field, value)} onDelete={() => onDelete(bonus.id)} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                ))}
              </div>
            )}

            <button onClick={onAdd} className="w-full px-5 py-3.5 flex items-center justify-center gap-2 text-sm font-medium text-slate-600 hover:bg-slate-50 border-t border-slate-100 transition-colors">
              <I.Plus size={16} /> New bonus
            </button>
          </div>
        </div>
      );
    }

    function BonusRow({ bonus, onUpdate, onDelete, openMenu, setOpenMenu }) {
      const menuId = `bonus-status-${bonus.id}`;
      const isMenuOpen = openMenu === menuId;
      const status = BONUS_STATUSES.find(s => s.id === bonus.status) || BONUS_STATUSES[0];
      const [localAmount, setLocalAmount] = useState(bonus.amount);
      const [localNote, setLocalNote] = useState(bonus.note || '');

      useEffect(() => { setLocalAmount(bonus.amount); }, [bonus.amount]);
      useEffect(() => { setLocalNote(bonus.note || ''); }, [bonus.note]);

      return (
        <div className="grid grid-cols-1 md:grid-cols-[140px_140px_1fr_140px_40px] gap-2 md:gap-3 px-5 py-3 hover:bg-slate-50 transition-colors group">
          <input type="date" value={bonus.date} onChange={(e) => onUpdate('date', e.target.value)} className="px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-slate-200 focus:border-amber-300 focus:bg-white rounded-md outline-none focus:ring-2 focus:ring-amber-100 transition-all" />

          <div className="relative">
            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">$</span>
            <input type="number" step="0.01" value={localAmount} onChange={(e) => setLocalAmount(e.target.value)} onBlur={() => Number(localAmount) !== Number(bonus.amount) && onUpdate('amount', Number(localAmount) || 0)} placeholder="0.00"
              className="w-full pl-5 pr-2 py-1.5 text-sm font-medium bg-transparent border border-transparent hover:border-slate-200 focus:border-amber-300 focus:bg-white rounded-md outline-none focus:ring-2 focus:ring-amber-100 transition-all" />
          </div>

          <input type="text" value={localNote} onChange={(e) => setLocalNote(e.target.value)} onBlur={() => localNote !== bonus.note && onUpdate('note', localNote)} placeholder="Add a note (optional)..."
            className="px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-slate-200 focus:border-amber-300 focus:bg-white rounded-md outline-none focus:ring-2 focus:ring-amber-100 transition-all" />

          <div className="relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={() => setOpenMenu(isMenuOpen ? null : menuId)} className={`w-full flex items-center justify-between gap-1.5 px-2.5 py-1.5 rounded-md text-sm font-medium transition-colors ${status.bg} ${status.text} hover:opacity-80`}>
              <span className="flex items-center gap-1.5"><div className={`w-1.5 h-1.5 rounded-full ${status.dot}`} />{status.label}</span>
              <I.ChevDown size={14} className="opacity-60" />
            </button>
            {isMenuOpen && (
              <div className="absolute z-20 top-full mt-1 left-0 right-0 min-w-[140px] bg-white border border-slate-200 rounded-lg shadow-lg py-1 overflow-hidden">
                {BONUS_STATUSES.map(s => (
                  <button key={s.id} onClick={() => { onUpdate('status', s.id); setOpenMenu(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-slate-50 transition-colors">
                    <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded ${s.bg} ${s.text} text-xs font-medium`}>
                      <div className={`w-1.5 h-1.5 rounded-full ${s.dot}`} />{s.label}
                    </div>
                    {bonus.status === s.id && <I.Check size={14} className="text-slate-400 ml-auto" />}
                  </button>
                ))}
              </div>
            )}
          </div>

          <button onClick={onDelete} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors opacity-0 group-hover:opacity-100 md:justify-self-end self-center" aria-label="Delete bonus">
            <I.Trash size={16} />
          </button>
        </div>
      );
    }

    // ====== ROOT ======
    function App() {
      const [configured, setConfigured] = useState(!!_initialConfig);
      const [session, setSession] = useState(null);
      const [checking, setChecking] = useState(!!_initialConfig);

      useEffect(() => {
        if (!configured || !supabaseClient) return;
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setChecking(false);
        });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });
        return () => subscription.unsubscribe();
      }, [configured]);

      const handleSignOut = async () => {
        await supabaseClient.auth.signOut();
        setSession(null);
      };

      const handleResetConfig = () => {
        if (confirm('Reset connection settings? You will need to enter your URL and key again.')) {
          clearConfig();
          window.location.reload();
        }
      };

      if (!configured) {
        return <SetupScreen onConfigured={() => { setConfigured(true); setChecking(true); }} />;
      }
      if (checking) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100">
            <I.Loader size={32} className="text-pink-500" />
          </div>
        );
      }
      if (!session) return <AuthScreen onAuth={setSession} onResetConfig={handleResetConfig} />;
      return <Tracker session={session} onSignOut={handleSignOut} onResetConfig={handleResetConfig} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
