<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Tracker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #050507; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.35s ease-out; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .gold-text {
      background: linear-gradient(135deg, #fde68a 0%, #f59e0b 25%, #fbbf24 50%, #d97706 75%, #fcd34d 100%);
      background-size: 200% auto;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 6s linear infinite;
    }
    .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #2a2a35; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    ::selection { background: rgba(251,191,36,0.3); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    // ====== CONFIG (browser-stored, no code editing) ======
    const CONFIG_KEY = 'tt-supabase-config';
    const loadConfig = () => { try { const s = localStorage.getItem(CONFIG_KEY); return s ? JSON.parse(s) : null; } catch { return null; } };
    const saveConfig = (url, key) => localStorage.setItem(CONFIG_KEY, JSON.stringify({ url, key }));
    const clearConfig = () => localStorage.removeItem(CONFIG_KEY);

    let supabaseClient = null;
    const initSupabase = (url, key) => { supabaseClient = window.supabase.createClient(url, key); return supabaseClient; };
    const _initialConfig = loadConfig();
    if (_initialConfig) initSupabase(_initialConfig.url, _initialConfig.key);

    // ====== ACCOUNTS (premium gold/purple-leaning palette, each still distinct) ======
    const ACCOUNTS = [
      { id: 'juanxvma',  name: 'Juanxvma',  handle: 'juanxvma',  label: 'Main Account', url: 'https://www.tiktok.com/@juanxvma',
        gradient: 'from-fuchsia-500 via-purple-500 to-violet-600', glow: 'rgba(192,38,211,0.35)', accent: '#c026d3', ring: 'ring-fuchsia-500/40' },
      { id: 'montesftbl', name: 'Montesftbl', handle: 'montesftbl', label: 'Football', url: 'https://www.tiktok.com/@montesftbl',
        gradient: 'from-indigo-500 via-blue-500 to-violet-600', glow: 'rgba(79,70,229,0.35)', accent: '#6366f1', ring: 'ring-indigo-500/40' },
      { id: 'crxnosf1',   name: 'Crxnos.f1', handle: 'crxnos.f1', label: 'Formula 1', url: 'https://www.tiktok.com/@crxnos.f1',
        gradient: 'from-amber-400 via-orange-500 to-red-500', glow: 'rgba(245,158,11,0.35)', accent: '#f59e0b', ring: 'ring-amber-500/40' },
      { id: 'shelbyftbl', name: 'Shelbyftbl', handle: 'shelbyftbl', label: 'Football', url: 'https://www.tiktok.com/@shelbyftbl',
        gradient: 'from-amber-300 via-yellow-500 to-amber-600', glow: 'rgba(217,119,6,0.35)', accent: '#d97706', ring: 'ring-yellow-500/40' },
    ];

    const VIDEO_TYPES = [
      { id: 'campaign',  label: 'Campaign',  bg: 'bg-violet-500/15', text: 'text-violet-300', dot: 'bg-violet-400', border: 'border-violet-500/30' },
      { id: 'authentic', label: 'Authentic', bg: 'bg-amber-500/15',  text: 'text-amber-300',  dot: 'bg-amber-400',  border: 'border-amber-500/30' },
    ];

    const BONUS_STATUSES = [
      { id: 'pending',  label: 'Pending',  bg: 'bg-amber-500/15',   text: 'text-amber-300',   dot: 'bg-amber-400',   border: 'border-amber-500/30' },
      { id: 'received', label: 'Received', bg: 'bg-emerald-500/15', text: 'text-emerald-300', dot: 'bg-emerald-400', border: 'border-emerald-500/30' },
    ];

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // ====== HELPERS ======
    const formatMonthKey = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    const parseMonthKey = (key) => { const [y, m] = key.split('-'); return { year: parseInt(y), month: parseInt(m) - 1 }; };
    const formatMonthLabel = (key) => { const { year, month } = parseMonthKey(key); return `${MONTH_NAMES[month]} ${year}`; };
    const formatMonthShort = (key) => { const { year, month } = parseMonthKey(key); return `${MONTH_SHORT[month]} '${String(year).slice(2)}`; };
    const todayISO = () => new Date().toISOString().split('T')[0];
    const formatCurrency = (n) => `$${Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const formatNumber = (n) => Number(n || 0).toLocaleString('en-US');
    const formatCompact = (n) => {
      const num = Number(n || 0);
      if (num >= 1e6) return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
      return String(num);
    };

    // Quick-add: detect which account a TikTok URL belongs to
    const detectAccountFromUrl = (url) => {
      if (!url) return null;
      const m = url.match(/tiktok\.com\/@([a-zA-Z0-9._]+)/i);
      if (!m) return null;
      const handle = m[1].toLowerCase();
      const acc = ACCOUNTS.find(a => a.handle.toLowerCase() === handle);
      return acc ? acc.id : null;
    };
    const isValidTikTokUrl = (url) => /tiktok\.com\//i.test(url);

    // Sort month keys chronologically
    const sortMonthKeys = (keys) => [...keys].sort((a, b) => {
      const pa = parseMonthKey(a), pb = parseMonthKey(b);
      return pa.year !== pb.year ? pa.year - pb.year : pa.month - pb.month;
    });

    // Get last N months as keys ending at a given month
    const lastNMonths = (endKey, n) => {
      const { year, month } = parseMonthKey(endKey);
      const out = [];
      for (let i = n - 1; i >= 0; i--) out.push(formatMonthKey(new Date(year, month - i, 1)));
      return out;
    };

    // ====== ICONS ======
    const Icon = ({ d, size = 16, className = '', strokeWidth = 2 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>
    );
    const I = {
      Dashboard: (p) => <Icon {...p} d={<><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></>} />,
      Video: (p) => <Icon {...p} d={<><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></>} />,
      Dollar: (p) => <Icon {...p} d={<><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>} />,
      Plus: (p) => <Icon {...p} d={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />,
      Trash: (p) => <Icon {...p} d={<><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>} />,
      External: (p) => <Icon {...p} d={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>} />,
      Trend: (p) => <Icon {...p} d={<><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></>} />,
      Users: (p) => <Icon {...p} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>} />,
      Heart: (p) => <Icon {...p} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />,
      Calendar: (p) => <Icon {...p} d={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />,
      ChevDown: (p) => <Icon {...p} d={<polyline points="6 9 12 15 18 9"/>} />,
      ChevLeft: (p) => <Icon {...p} d={<polyline points="15 18 9 12 15 6"/>} />,
      ChevRight: (p) => <Icon {...p} d={<polyline points="9 18 15 12 9 6"/>} />,
      Check: (p) => <Icon {...p} d={<polyline points="20 6 9 17 4 12"/>} />,
      Loader: (p) => <Icon {...p} className={`animate-spin ${p.className || ''}`} d={<><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></>} />,
      Cloud: (p) => <Icon {...p} d={<path d="M17.5 19a4.5 4.5 0 1 0 0-9c-.21 0-.42.01-.62.04A6.5 6.5 0 0 0 4 12.5C4 16.09 6.91 19 10.5 19h7Z"/>} />,
      CloudOff: (p) => <Icon {...p} d={<><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3"/><line x1="1" y1="1" x2="23" y2="23"/></>} />,
      Sparkles: (p) => <Icon {...p} d={<path d="M12 3l1.9 5.8H20l-4.9 3.6 1.9 5.8L12 14.6l-4.9 3.6 1.9-5.8L4 8.8h6.1L12 3z"/>} />,
      Edit: (p) => <Icon {...p} d={<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></>} />,
      Film: (p) => <Icon {...p} d={<><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></>} />,
      Award: (p) => <Icon {...p} d={<><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></>} />,
      Logout: (p) => <Icon {...p} d={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />,
      Mail: (p) => <Icon {...p} d={<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>} />,
      Lock: (p) => <Icon {...p} d={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />,
      Eye: (p) => <Icon {...p} d={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />,
      Alert: (p) => <Icon {...p} d={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />,
      Zap: (p) => <Icon {...p} d={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>} />,
      Chart: (p) => <Icon {...p} d={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />,
      Clipboard: (p) => <Icon {...p} d={<><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></>} />,
      Crown: (p) => <Icon {...p} d={<path d="M2 18h20l-2-10-5 4-3-7-3 7-5-4z"/>} />,
    };

    // ====== SETUP SCREEN (dark) ======
    function SetupScreen({ onConfigured }) {
      const [url, setUrl] = useState('');
      const [key, setKey] = useState('');
      const [testing, setTesting] = useState(false);
      const [error, setError] = useState('');

      const submit = async (e) => {
        e.preventDefault();
        setError('');
        const trimmedUrl = url.trim().replace(/\/$/, '');
        const trimmedKey = key.trim();
        if (!trimmedUrl.startsWith('https://') || !trimmedUrl.includes('.supabase.co')) {
          setError('That doesn\'t look like a Supabase URL. It should look like: https://abc123.supabase.co'); return;
        }
        if (trimmedKey.length < 20) { setError('That key looks too short. Make sure you copied the whole thing.'); return; }
        setTesting(true);
        try {
          const testClient = window.supabase.createClient(trimmedUrl, trimmedKey);
          const { error: testError } = await testClient.from('videos').select('id').limit(1);
          if (testError && !testError.message.includes('JWT') && testError.code !== 'PGRST301') {
            if (testError.message.includes('relation') || testError.message.includes('does not exist')) {
              throw new Error('Connected to Supabase, but the database tables are missing. Did you run the SQL from supabase-schema.sql?');
            }
            throw new Error(testError.message);
          }
          saveConfig(trimmedUrl, trimmedKey);
          initSupabase(trimmedUrl, trimmedKey);
          onConfigured();
        } catch (err) {
          setError(err.message || 'Could not connect. Double-check your URL and key.');
        } finally { setTesting(false); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'radial-gradient(circle at 30% 20%, #1a1025 0%, #050507 55%)' }}>
          <div className="w-full max-w-lg fade-in">
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 via-amber-500 to-purple-600 shadow-2xl mb-4" style={{ boxShadow: '0 0 40px rgba(245,158,11,0.4)' }}>
                <I.Sparkles size={28} className="text-black" />
              </div>
              <h1 className="text-3xl font-bold text-white">Welcome, <span className="gold-text">Juan</span></h1>
              <p className="text-slate-400 mt-1">Let's connect your database. One-time setup.</p>
            </div>
            <div className="bg-[#0e0e14] rounded-2xl shadow-2xl border border-white/10 p-6 sm:p-8">
              <form onSubmit={submit} className="space-y-5">
                <div>
                  <label className="block text-sm font-semibold text-slate-200 mb-1.5">1. Your Supabase Project URL</label>
                  <input type="url" value={url} onChange={(e) => setUrl(e.target.value)} required placeholder="https://abc123.supabase.co"
                    className="w-full px-3 py-2.5 bg-black/40 border border-white/10 rounded-lg text-white placeholder-slate-600 focus:border-amber-400/60 focus:ring-2 focus:ring-amber-500/20 outline-none transition text-sm font-mono" />
                  <p className="text-xs text-slate-500 mt-1.5">Supabase: <span className="font-semibold text-slate-400">Project Settings → Data API → Project URL</span></p>
                </div>
                <div>
                  <label className="block text-sm font-semibold text-slate-200 mb-1.5">2. Your Publishable Key</label>
                  <input type="text" value={key} onChange={(e) => setKey(e.target.value)} required placeholder="sb_publishable_..."
                    className="w-full px-3 py-2.5 bg-black/40 border border-white/10 rounded-lg text-white placeholder-slate-600 focus:border-amber-400/60 focus:ring-2 focus:ring-amber-500/20 outline-none transition text-sm font-mono" />
                  <p className="text-xs text-slate-500 mt-1.5">Supabase: <span className="font-semibold text-slate-400">Project Settings → API Keys → Publishable key</span></p>
                  <p className="text-xs text-amber-400/80 mt-1 flex items-start gap-1"><I.Alert size={12} className="mt-0.5 shrink-0" /><span>Use the <span className="font-semibold">publishable</span> key, NOT the secret key!</span></p>
                </div>
                {error && <div className="bg-red-500/10 border border-red-500/30 text-red-300 px-3 py-2.5 rounded-lg text-sm flex items-start gap-2"><I.Alert size={16} className="mt-0.5 shrink-0" /><span>{error}</span></div>}
                <button type="submit" disabled={testing}
                  className="w-full py-3 bg-gradient-to-r from-amber-400 via-amber-500 to-purple-600 text-black font-bold rounded-lg shadow-lg hover:opacity-95 disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                  {testing ? <><I.Loader size={16} /> Testing connection...</> : <><I.Cloud size={16} /> Connect to my database</>}
                </button>
              </form>
              <div className="mt-6 pt-5 border-t border-white/10">
                <p className="text-xs text-slate-500 text-center">Your credentials are stored only in this browser. They never leave your device.</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ====== AUTH SCREEN (dark) ======
    function AuthScreen({ onAuth, onResetConfig }) {
      const [mode, setMode] = useState('signin');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [showPwd, setShowPwd] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [info, setInfo] = useState('');

      const submit = async (e) => {
        e.preventDefault();
        setError(''); setInfo(''); setLoading(true);
        try {
          if (mode === 'signup') {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.user && !data.session) { setInfo('Account created. Check your email to confirm, then sign in.'); setMode('signin'); }
            else onAuth(data.session);
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            onAuth(data.session);
          }
        } catch (err) { setError(err.message || 'Something went wrong'); }
        finally { setLoading(false); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4" style={{ background: 'radial-gradient(circle at 70% 30%, #1a1025 0%, #050507 55%)' }}>
          <div className="w-full max-w-md fade-in">
            <div className="text-center mb-8">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 via-amber-500 to-purple-600 shadow-2xl mb-4" style={{ boxShadow: '0 0 40px rgba(245,158,11,0.4)' }}>
                <I.Sparkles size={28} className="text-black" />
              </div>
              <h1 className="text-3xl font-bold text-white">TikTok <span className="gold-text">Tracker</span></h1>
              <p className="text-slate-400 mt-1">Your content command center</p>
            </div>
            <div className="bg-[#0e0e14] rounded-2xl shadow-2xl border border-white/10 p-6 sm:p-8">
              <div className="flex gap-2 mb-6 bg-black/40 rounded-lg p-1">
                <button type="button" onClick={() => { setMode('signin'); setError(''); setInfo(''); }}
                  className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all ${mode === 'signin' ? 'bg-gradient-to-r from-amber-500 to-purple-600 text-black' : 'text-slate-400 hover:text-white'}`}>Sign in</button>
                <button type="button" onClick={() => { setMode('signup'); setError(''); setInfo(''); }}
                  className={`flex-1 py-2 px-4 rounded-md text-sm font-medium transition-all ${mode === 'signup' ? 'bg-gradient-to-r from-amber-500 to-purple-600 text-black' : 'text-slate-400 hover:text-white'}`}>Sign up</button>
              </div>
              <form onSubmit={submit} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-300 mb-1.5">Email</label>
                  <div className="relative">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><I.Mail size={16} /></div>
                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required placeholder="you@example.com"
                      className="w-full pl-10 pr-3 py-2.5 bg-black/40 border border-white/10 rounded-lg text-white placeholder-slate-600 focus:border-amber-400/60 focus:ring-2 focus:ring-amber-500/20 outline-none transition" />
                  </div>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                  <div className="relative">

    // ====== CHARTS (custom SVG, dark) ======
    function BarChart({ data, accent = '#f59e0b', height = 160, valueFormat = formatNumber }) {
      // data: [{ label, value }]
      const max = Math.max(1, ...data.map(d => d.value));
      const [hover, setHover] = useState(null);
      const W = Math.max(data.length * 48, 240);
      const barW = W / data.length;
      const padBottom = 28, padTop = 16;
      const chartH = height - padBottom - padTop;

      return (
        <div className="w-full overflow-x-auto scrollbar-thin">
          <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{ minWidth: W, display: 'block' }}>
            <defs>
              <linearGradient id={`barGrad-${accent.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={accent} stopOpacity="0.95" />
                <stop offset="100%" stopColor={accent} stopOpacity="0.35" />
              </linearGradient>
            </defs>
            {[0.25, 0.5, 0.75, 1].map((g, i) => (
              <line key={i} x1="0" x2={W} y1={padTop + chartH * (1 - g)} y2={padTop + chartH * (1 - g)} stroke="#ffffff" strokeOpacity="0.05" strokeWidth="1" />
            ))}
            {data.map((d, i) => {
              const h = (d.value / max) * chartH;
              const x = i * barW + barW * 0.2;
              const w = barW * 0.6;
              const y = padTop + chartH - h;
              return (
                <g key={i} onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)} style={{ cursor: 'pointer' }}>
                  <rect x={x} y={padTop} width={w} height={chartH} fill="transparent" />
                  <rect x={x} y={y} width={w} height={Math.max(h, 2)} rx="4" fill={`url(#barGrad-${accent.replace('#','')})`}
                    style={{ transition: 'all 0.4s ease', filter: hover === i ? `drop-shadow(0 0 6px ${accent})` : 'none' }} />
                  {hover === i && (
                    <text x={x + w/2} y={y - 6} textAnchor="middle" fill="#fff" fontSize="11" fontWeight="700">{valueFormat(d.value)}</text>
                  )}
                  <text x={x + w/2} y={height - 9} textAnchor="middle" fill="#64748b" fontSize="10">{d.label}</text>
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    function LineChart({ series, height = 180, valueFormat = formatCompact }) {
      // series: [{ name, color, points: [{label, value}] }]
      const labels = series[0]?.points.map(p => p.label) || [];
      const allValues = series.flatMap(s => s.points.map(p => p.value));
      const max = Math.max(1, ...allValues);
      const [hoverIdx, setHoverIdx] = useState(null);
      const W = Math.max(labels.length * 60, 280), padL = 8, padR = 8, padBottom = 26, padTop = 14;
      const chartH = height - padBottom - padTop, chartW = W - padL - padR;
      const xFor = (i) => padL + (labels.length === 1 ? chartW/2 : (i / (labels.length - 1)) * chartW);
      const yFor = (v) => padTop + chartH - (v / max) * chartH;

      return (
        <div className="w-full overflow-x-auto scrollbar-thin">
          <svg viewBox={`0 0 ${W} ${height}`} width="100%" style={{ minWidth: W, display: 'block' }}
            onMouseLeave={() => setHoverIdx(null)}>
            {[0.25, 0.5, 0.75, 1].map((g, i) => (
              <line key={i} x1={padL} x2={W - padR} y1={padTop + chartH * (1 - g)} y2={padTop + chartH * (1 - g)} stroke="#ffffff" strokeOpacity="0.05" />
            ))}
            {labels.map((lb, i) => (
              <g key={i}>
                <rect x={xFor(i) - 20} y={0} width="40" height={height} fill="transparent" onMouseEnter={() => setHoverIdx(i)} />
                <text x={xFor(i)} y={height - 8} textAnchor="middle" fill="#64748b" fontSize="10">{lb}</text>
                {hoverIdx === i && <line x1={xFor(i)} x2={xFor(i)} y1={padTop} y2={padTop + chartH} stroke="#ffffff" strokeOpacity="0.15" />}
              </g>
            ))}
            {series.map((s, si) => {
              const pts = s.points.map((p, i) => `${xFor(i)},${yFor(p.value)}`).join(' ');
              const areaPts = `${padL},${padTop+chartH} ${pts} ${W-padR},${padTop+chartH}`;
              return (
                <g key={si}>
                  <defs>
                    <linearGradient id={`lineGrad-${si}`} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={s.color} stopOpacity="0.25" />
                      <stop offset="100%" stopColor={s.color} stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  <polygon points={areaPts} fill={`url(#lineGrad-${si})`} />
                  <polyline points={pts} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ filter: `drop-shadow(0 0 4px ${s.color}88)` }} />
                  {s.points.map((p, i) => (
                    <circle key={i} cx={xFor(i)} cy={yFor(p.value)} r={hoverIdx === i ? 4.5 : 2.5} fill={s.color} stroke="#0e0e14" strokeWidth="1.5" style={{ transition: 'r 0.15s' }} />
                  ))}
                  {hoverIdx !== null && s.points[hoverIdx] && (
                    <text x={xFor(hoverIdx)} y={yFor(s.points[hoverIdx].value) - 10} textAnchor="middle" fill={s.color} fontSize="11" fontWeight="700">{valueFormat(s.points[hoverIdx].value)}</text>
                  )}
                </g>
              );
            })}
          </svg>
        </div>
      );
    }

    function DonutChart({ segments, size = 140 }) {
      // segments: [{ label, value, color }]
      const total = segments.reduce((s, x) => s + x.value, 0);
      const r = size / 2 - 14, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
      let offset = 0;
      return (
        <div className="flex items-center gap-5">
          <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
            <circle cx={cx} cy={cy} r={r} fill="none" stroke="#ffffff" strokeOpacity="0.06" strokeWidth="14" />
            {total > 0 && segments.map((seg, i) => {
              const len = (seg.value / total) * circ;
              const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth="14"
                strokeDasharray={`${len} ${circ - len}`} strokeDashoffset={-offset} strokeLinecap="butt"
                style={{ transition: 'stroke-dasharray 0.5s' }} />;
              offset += len;
              return el;
            })}
          </svg>
          <div className="space-y-1.5">
            {segments.map((seg, i) => (
              <div key={i} className="flex items-center gap-2 text-sm">
                <div className="w-2.5 h-2.5 rounded-full" style={{ background: seg.color }} />
                <span className="text-slate-400">{seg.label}</span>
                <span className="text-white font-semibold ml-auto pl-3">{seg.value}</span>
              </div>
            ))}
            {total === 0 && <div className="text-xs text-slate-600">No data yet</div>}
          </div>
        </div>
      );
    }

    // ====== MAIN TRACKER ======
    function Tracker({ session, onSignOut, onResetConfig }) {
      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);
      const [synced, setSynced] = useState(true);
      const [activeTab, setActiveTab] = useState('dashboard');
      const [currentMonth, setCurrentMonth] = useState(formatMonthKey(new Date()));
      const [videos, setVideos] = useState({});
      const [bonuses, setBonuses] = useState([]);
      const [accountStats, setAccountStats] = useState({});
      const [openMenu, setOpenMenu] = useState(null);
      const [editingStat, setEditingStat] = useState(null);
      const userId = session.user.id;

      useEffect(() => {
        (async () => {
          try {
            const [videosRes, bonusesRes, statsRes] = await Promise.all([
              supabaseClient.from('videos').select('*').order('created_at', { ascending: true }),
              supabaseClient.from('bonuses').select('*').order('created_at', { ascending: false }),
              supabaseClient.from('account_stats').select('*'),
            ]);
            const videoMap = {};
            (videosRes.data || []).forEach(v => {
              if (!videoMap[v.account_id]) videoMap[v.account_id] = {};
              if (!videoMap[v.account_id][v.month]) videoMap[v.account_id][v.month] = [];
              videoMap[v.account_id][v.month].push({ id: v.id, link: v.link || '', date: v.date, type: v.type });
            });
            setVideos(videoMap);
            setBonuses((bonusesRes.data || []).map(b => ({ id: b.id, date: b.date, amount: b.amount, status: b.status, note: b.note || '' })));
            const statsMap = {};
            (statsRes.data || []).forEach(s => { if (!statsMap[s.account_id]) statsMap[s.account_id] = {}; statsMap[s.account_id][s.month] = { followers: s.followers, likes: s.likes }; });
            setAccountStats(statsMap);
          } catch (err) { console.error('Load error:', err); }
          finally { setLoading(false); }
        })();
      }, []);

      useEffect(() => {
        const handler = () => setOpenMenu(null);
        if (openMenu) { document.addEventListener('click', handler); return () => document.removeEventListener('click', handler); }
      }, [openMenu]);

      const withSync = async (fn) => {
        setSyncing(true); setSynced(false);
        try { await fn(); setSynced(true); } catch (err) { console.error('Sync error:', err); setSynced(false); } finally { setSyncing(false); }
      };

      // VIDEO ops
      const addVideoRow = (accountId, monthKey) => {
        withSync(async () => {
          const newVideo = { user_id: userId, account_id: accountId, month: monthKey, link: '', date: todayISO(), type: 'authentic' };
          const { data, error } = await supabaseClient.from('videos').insert(newVideo).select().single();
          if (error) throw error;
          setVideos(prev => {
            const u = { ...prev };
            if (!u[accountId]) u[accountId] = {};
            if (!u[accountId][monthKey]) u[accountId][monthKey] = [];
            u[accountId][monthKey] = [...u[accountId][monthKey], { id: data.id, link: data.link, date: data.date, type: data.type }];
            return u;
          });
        });
      };

      // QUICK ADD: insert a fully-formed video (link + type) into the right account/month
      const quickAddVideo = async (accountId, link, type) => {
        const monthKey = currentMonth;
        await withSync(async () => {
          const newVideo = { user_id: userId, account_id: accountId, month: monthKey, link, date: todayISO(), type };
          const { data, error } = await supabaseClient.from('videos').insert(newVideo).select().single();
          if (error) throw error;
          setVideos(prev => {
            const u = { ...prev };
            if (!u[accountId]) u[accountId] = {};
            if (!u[accountId][monthKey]) u[accountId][monthKey] = [];
            u[accountId][monthKey] = [...u[accountId][monthKey], { id: data.id, link: data.link, date: data.date, type: data.type }];
            return u;
          });
        });
      };

      const updateVideo = (accountId, monthKey, videoId, field, value) => {
        setVideos(prev => {
          const u = { ...prev };
          u[accountId][monthKey] = u[accountId][monthKey].map(v => v.id === videoId ? { ...v, [field]: value } : v);
          return u;
        });
        withSync(async () => { const { error } = await supabaseClient.from('videos').update({ [field]: value }).eq('id', videoId); if (error) throw error; });
      };

      const deleteVideo = (accountId, monthKey, videoId) => {
        setVideos(prev => { const u = { ...prev }; u[accountId][monthKey] = u[accountId][monthKey].filter(v => v.id !== videoId); return u; });
        withSync(async () => { const { error } = await supabaseClient.from('videos').delete().eq('id', videoId); if (error) throw error; });
      };

      // BONUS ops
      const addBonus = () => {
        withSync(async () => {
          const nb = { user_id: userId, date: todayISO(), amount: 0, status: 'pending', note: '' };
          const { data, error } = await supabaseClient.from('bonuses').insert(nb).select().single();
          if (error) throw error;
          setBonuses(prev => [{ id: data.id, date: data.date, amount: data.amount, status: data.status, note: data.note || '' }, ...prev]);
        });
      };
      const updateBonus = (bonusId, field, value) => {
        setBonuses(prev => prev.map(b => b.id === bonusId ? { ...b, [field]: value } : b));
        withSync(async () => { const { error } = await supabaseClient.from('bonuses').update({ [field]: value }).eq('id', bonusId); if (error) throw error; });
      };
      const deleteBonus = (bonusId) => {
        setBonuses(prev => prev.filter(b => b.id !== bonusId));
        withSync(async () => { const { error } = await supabaseClient.from('bonuses').delete().eq('id', bonusId); if (error) throw error; });
      };

      // STAT ops
      const updateAccountStat = (accountId, monthKey, field, value) => {
        const numValue = Number(value) || 0;
        setAccountStats(prev => {
          const u = { ...prev };
          if (!u[accountId]) u[accountId] = {};
          if (!u[accountId][monthKey]) u[accountId][monthKey] = { followers: 0, likes: 0 };
          u[accountId][monthKey] = { ...u[accountId][monthKey], [field]: numValue };
          return u;
        });
        withSync(async () => {
          const cur = { followers: 0, likes: 0, ...(accountStats[accountId]?.[monthKey] || {}), [field]: numValue };
          const { error } = await supabaseClient.from('account_stats').upsert(
            { user_id: userId, account_id: accountId, month: monthKey, followers: cur.followers, likes: cur.likes },
            { onConflict: 'user_id,account_id,month' });
          if (error) throw error;
        });
      };

      // COUNTERS
      const getMonthVideos = (accountId, monthKey) => videos[accountId]?.[monthKey] || [];
      const countMonthVideos = (accountId, monthKey) => getMonthVideos(accountId, monthKey).filter(v => v.link.trim()).length;
      const countAllTimeVideos = (accountId) => videos[accountId] ? Object.values(videos[accountId]).reduce((s, arr) => s + arr.filter(v => v.link.trim()).length, 0) : 0;
      const countTotalThisMonth = () => ACCOUNTS.reduce((s, a) => s + countMonthVideos(a.id, currentMonth), 0);
      const countGrandTotal = () => ACCOUNTS.reduce((s, a) => s + countAllTimeVideos(a.id), 0);
      const getStats = (accountId, monthKey) => accountStats[accountId]?.[monthKey] || { followers: 0, likes: 0 };

      const totalEarned = bonuses.reduce((s, b) => s + Number(b.amount || 0), 0);
      const totalReceived = bonuses.filter(b => b.status === 'received').reduce((s, b) => s + Number(b.amount || 0), 0);
      const totalPending = bonuses.filter(b => b.status === 'pending').reduce((s, b) => s + Number(b.amount || 0), 0);
      const monthBonuses = bonuses.filter(b => b.date && b.date.startsWith(currentMonth));
      const monthBonusTotal = monthBonuses.reduce((s, b) => s + Number(b.amount || 0), 0);

      const goPrevMonth = () => { const { year, month } = parseMonthKey(currentMonth); setCurrentMonth(formatMonthKey(new Date(year, month - 1, 1))); };
      const goNextMonth = () => { const { year, month } = parseMonthKey(currentMonth); setCurrentMonth(formatMonthKey(new Date(year, month + 1, 1))); };

      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center" style={{ background: '#050507' }}>
            <div className="text-center">
              <I.Loader size={44} className="text-amber-400 mx-auto mb-4" />
              <p className="text-slate-400 font-medium">Loading your data from the cloud...</p>
            </div>
          </div>
        );
      }

      const activeAccount = ACCOUNTS.find(a => a.id === activeTab);

      return (
        <div className="min-h-screen text-slate-200" style={{ background: '#050507' }}>
          {/* Header */}
          <div className="sticky top-0 z-30 border-b border-white/10" style={{ background: 'rgba(5,5,7,0.85)', backdropFilter: 'blur(12px)' }}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4">
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-400 via-amber-500 to-purple-600 flex items-center justify-center shadow-lg" style={{ boxShadow: '0 0 24px rgba(245,158,11,0.35)' }}>
                    <I.Sparkles size={20} className="text-black" />
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-tight text-white">TikTok <span className="gold-text">Tracker</span></h1>
                    <p className="text-xs text-slate-500">{session.user.email}</p>
                  </div>
                </div>
                <div className="flex items-center gap-2 text-xs">
                  {syncing ? <span className="flex items-center gap-1.5 text-amber-300 bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-full font-medium"><I.Loader size={13} /> Syncing</span>
                    : synced ? <span className="flex items-center gap-1.5 text-emerald-300 bg-emerald-500/10 border border-emerald-500/20 px-3 py-1.5 rounded-full font-medium"><I.Cloud size={13} /> Synced</span>
                    : <span className="flex items-center gap-1.5 text-red-300 bg-red-500/10 border border-red-500/20 px-3 py-1.5 rounded-full font-medium"><I.CloudOff size={13} /> Issue</span>}
                  <button onClick={onSignOut} className="flex items-center gap-1.5 text-slate-400 hover:text-white bg-white/5 hover:bg-white/10 border border-white/10 px-3 py-1.5 rounded-full font-medium transition" title="Sign out"><I.Logout size={13} /> Sign out</button>
                </div>
              </div>
              <div className="flex items-center gap-1 mt-4 overflow-x-auto scrollbar-thin pb-1 -mx-1 px-1">
                <TabButton active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<I.Dashboard size={16} />} label="Dashboard" />
                <TabButton active={activeTab === 'analytics'} onClick={() => setActiveTab('analytics')} icon={<I.Chart size={16} />} label="Analytics" />
                {ACCOUNTS.map(acc => (
                  <TabButton key={acc.id} active={activeTab === acc.id} onClick={() => setActiveTab(acc.id)}
                    icon={<div className={`w-2.5 h-2.5 rounded-full bg-gradient-to-br ${acc.gradient}`} />} label={acc.name} />
                ))}
                <TabButton active={activeTab === 'bonuses'} onClick={() => setActiveTab('bonuses')} icon={<I.Dollar size={16} />} label="Bonuses" />
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-6 fade-in" key={activeTab}>
            {activeTab === 'dashboard' && (
              <DashboardView {...{ currentMonth, onPrevMonth: goPrevMonth, onNextMonth: goNextMonth, countMonthVideos, countAllTimeVideos, countTotalThisMonth, countGrandTotal, getStats, totalEarned, totalReceived, totalPending, monthBonusTotal, setActiveTab, quickAddVideo }} />
            )}
            {activeTab === 'analytics' && (
              <AnalyticsView {...{ currentMonth, videos, accountStats, countMonthVideos, countAllTimeVideos, getStats }} />
            )}
            {activeAccount && (
              <AccountView {...{ account: activeAccount, currentMonth, onPrevMonth: goPrevMonth, onNextMonth: goNextMonth,
                videos: getMonthVideos(activeAccount.id, currentMonth), stats: getStats(activeAccount.id, currentMonth),
                allTimeCount: countAllTimeVideos(activeAccount.id), monthCount: countMonthVideos(activeAccount.id, currentMonth),
                onAddVideo: () => addVideoRow(activeAccount.id, currentMonth),
                onUpdateVideo: (id, f, v) => updateVideo(activeAccount.id, currentMonth, id, f, v),
                onDeleteVideo: (id) => deleteVideo(activeAccount.id, currentMonth, id),
                onUpdateStat: (f, v) => updateAccountStat(activeAccount.id, currentMonth, f, v),
                openMenu, setOpenMenu, editingStat, setEditingStat }} />
            )}
            {activeTab === 'bonuses' && (
              <BonusesView {...{ bonuses, currentMonth, totalEarned, totalReceived, totalPending, monthBonusTotal, monthBonusCount: monthBonuses.length, onAdd: addBonus, onUpdate: updateBonus, onDelete: deleteBonus, openMenu, setOpenMenu }} />
            )}
          </div>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 pb-8 text-center">
            <button onClick={onResetConfig} className="text-xs text-slate-700 hover:text-slate-500 underline">Connection settings</button>
            <p className="text-xs text-slate-600 mt-2">Your data syncs to the cloud automatically · Sign in from any device</p>
          </div>
        </div>
      );
    }

    // ====== DASHBOARD ======
    function DashboardView({ currentMonth, onPrevMonth, onNextMonth, countMonthVideos, countAllTimeVideos, countTotalThisMonth, countGrandTotal, getStats, totalEarned, totalReceived, totalPending, monthBonusTotal, setActiveTab, quickAddVideo }) {
      const totalFollowers = ACCOUNTS.reduce((s, a) => s + getStats(a.id, currentMonth).followers, 0);
      const totalLikes = ACCOUNTS.reduce((s, a) => s + getStats(a.id, currentMonth).likes, 0);
      const monthTotal = countTotalThisMonth();
      const maxMonthVideos = Math.max(1, ...ACCOUNTS.map(a => countMonthVideos(a.id, currentMonth)));

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h2 className="text-2xl font-bold tracking-tight text-white">Overview</h2>
              <p className="text-sm text-slate-500 mt-0.5">Your content across all 4 accounts</p>
            </div>
            <MonthSelector currentMonth={currentMonth} onPrev={onPrevMonth} onNext={onNextMonth} />
          </div>

          <QuickAddBar onAdd={quickAddVideo} currentMonth={currentMonth} />

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Videos this month" value={monthTotal} icon={<I.Film size={16} />} accent="#c026d3" subtitle="Across all 4 accounts" />
            <StatCard label="All-time videos" value={countGrandTotal()} icon={<I.Video size={16} />} accent="#6366f1" subtitle="Total production" />
            <StatCard label="Followers (month)" value={formatCompact(totalFollowers)} icon={<I.Users size={16} />} accent="#a855f7" subtitle="Combined reach" />
            <StatCard label="Likes (month)" value={formatCompact(totalLikes)} icon={<I.Heart size={16} />} accent="#f59e0b" subtitle="Total engagement" />
          </div>

          <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-white flex items-center gap-2"><I.Trend size={16} className="text-amber-400" />Videos by account</h3>
              <span className="text-xs text-slate-500">{formatMonthLabel(currentMonth)}</span>
            </div>
            <div className="space-y-4">
              {ACCOUNTS.map(acc => {
                const count = countMonthVideos(acc.id, currentMonth);
                const total = countAllTimeVideos(acc.id);
                const pct = (count / maxMonthVideos) * 100;
                const stats = getStats(acc.id, currentMonth);
                return (
                  <button key={acc.id} onClick={() => setActiveTab(acc.id)} className="w-full text-left group">
                    <div className="flex items-center justify-between mb-2">
                      <div className="flex items-center gap-2.5">
                        <div className={`w-3 h-3 rounded-full bg-gradient-to-br ${acc.gradient}`} />
                        <span className="font-semibold text-sm text-slate-200">{acc.name}</span>
                        <span className="text-xs text-slate-600">· {acc.label}</span>
                      </div>
                      <div className="flex items-center gap-3 text-xs">
                        <span className="text-slate-500 hidden sm:inline-flex items-center gap-1"><I.Users size={12} />{formatCompact(stats.followers)}</span>
                        <span className="text-slate-500 hidden sm:inline-flex items-center gap-1"><I.Heart size={12} />{formatCompact(stats.likes)}</span>
                        <span className="font-bold text-white min-w-[40px] text-right">{count} <span className="text-slate-600 font-normal">/ {total}</span></span>
                      </div>
                    </div>
                    <div className="h-2.5 bg-white/5 rounded-full overflow-hidden">
                      <div className={`h-full bg-gradient-to-r ${acc.gradient} transition-all duration-700`} style={{ width: `${pct}%`, boxShadow: `0 0 12px ${acc.glow}` }} />
                    </div>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
            <div className="flex items-center justify-between mb-5">
              <h3 className="font-bold text-white flex items-center gap-2"><I.Award size={16} className="text-amber-400" />Bonuses summary</h3>
              <button onClick={() => setActiveTab('bonuses')} className="text-xs font-medium text-amber-400 hover:text-amber-300 flex items-center gap-1">Manage <I.ChevRight size={12} /></button>
            </div>
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
              <div className="bg-white/5 rounded-lg p-3 border border-white/10"><div className="text-xs text-slate-500 font-medium mb-1">Total earned</div><div className="text-lg font-bold text-white">{formatCurrency(totalEarned)}</div></div>
              <div className="bg-emerald-500/10 rounded-lg p-3 border border-emerald-500/20"><div className="text-xs text-emerald-400 font-medium mb-1">Received</div><div className="text-lg font-bold text-emerald-300">{formatCurrency(totalReceived)}</div></div>
              <div className="bg-amber-500/10 rounded-lg p-3 border border-amber-500/20"><div className="text-xs text-amber-400 font-medium mb-1">Pending</div><div className="text-lg font-bold text-amber-300">{formatCurrency(totalPending)}</div></div>
              <div className="bg-purple-500/10 rounded-lg p-3 border border-purple-500/20"><div className="text-xs text-purple-400 font-medium mb-1">This month</div><div className="text-lg font-bold text-purple-300">{formatCurrency(monthBonusTotal)}</div></div>
            </div>
          </div>
        </div>
      );
    }

    // ====== ANALYTICS ======
    function AnalyticsView({ currentMonth, videos, accountStats, countMonthVideos, countAllTimeVideos, getStats }) {
      const months = lastNMonths(currentMonth, 6);

      // Total videos per month (all accounts)
      const videosPerMonth = months.map(mk => ({
        label: formatMonthShort(mk),
        value: ACCOUNTS.reduce((s, a) => s + countMonthVideos(a.id, mk), 0),
      }));

      // Followers growth lines per account
      const followerSeries = ACCOUNTS.map(a => ({
        name: a.name, color: a.accent,
        points: months.map(mk => ({ label: formatMonthShort(mk), value: getStats(a.id, mk).followers })),
      }));

      // Likes growth lines per account
      const likeSeries = ACCOUNTS.map(a => ({
        name: a.name, color: a.accent,
        points: months.map(mk => ({ label: formatMonthShort(mk), value: getStats(a.id, mk).likes })),
      }));

      // All-time share donut
      const shareSegments = ACCOUNTS.map(a => ({ label: a.name, value: countAllTimeVideos(a.id), color: a.accent }));

      // Campaign vs authentic (this month, all accounts)
      let campaign = 0, authentic = 0;
      ACCOUNTS.forEach(a => (videos[a.id]?.[currentMonth] || []).forEach(v => {
        if (!v.link.trim()) return;
        if (v.type === 'campaign') campaign++; else authentic++;
      }));

      return (
        <div className="space-y-6">
          <div>
            <h2 className="text-2xl font-bold tracking-tight text-white flex items-center gap-2"><I.Chart size={22} className="text-amber-400" />Analytics</h2>
            <p className="text-sm text-slate-500 mt-0.5">Growth and production trends · last 6 months</p>
          </div>

          <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
            <h3 className="font-bold text-white mb-1">Videos posted per month</h3>
            <p className="text-xs text-slate-500 mb-4">All accounts combined</p>
            <BarChart data={videosPerMonth} accent="#f59e0b" valueFormat={formatNumber} />
          </div>

          <div className="grid lg:grid-cols-2 gap-6">
            <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
              <h3 className="font-bold text-white mb-1 flex items-center gap-2"><I.Users size={15} className="text-purple-400" />Followers growth</h3>
              <p className="text-xs text-slate-500 mb-4">Per account over time</p>
              <LineChart series={followerSeries} />
              <Legend />
            </div>
            <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
              <h3 className="font-bold text-white mb-1 flex items-center gap-2"><I.Heart size={15} className="text-amber-400" />Likes growth</h3>
              <p className="text-xs text-slate-500 mb-4">Per account over time</p>
              <LineChart series={likeSeries} />
              <Legend />
            </div>
          </div>

          <div className="grid lg:grid-cols-2 gap-6">
            <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
              <h3 className="font-bold text-white mb-4">All-time video share</h3>
              <DonutChart segments={shareSegments} />
            </div>
            <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
              <h3 className="font-bold text-white mb-1">Content type</h3>
              <p className="text-xs text-slate-500 mb-4">{formatMonthLabel(currentMonth)}</p>
              <DonutChart segments={[{ label: 'Campaign', value: campaign, color: '#a855f7' }, { label: 'Authentic', value: authentic, color: '#f59e0b' }]} />
            </div>
          </div>

          <p className="text-xs text-slate-600 text-center">Tip: enter your followers & likes each month on each account tab to see these charts grow.</p>
        </div>
      );
    }

    function Legend() {
      return (
        <div className="flex flex-wrap gap-3 mt-3 pt-3 border-t border-white/5">
          {ACCOUNTS.map(a => (
            <div key={a.id} className="flex items-center gap-1.5 text-xs text-slate-400">
              <div className="w-2.5 h-2.5 rounded-full" style={{ background: a.accent }} />{a.name}
            </div>
          ))}
        </div>
      );
    }

    // ====== ACCOUNT VIEW ======
    function AccountView({ account, currentMonth, onPrevMonth, onNextMonth, videos, stats, allTimeCount, monthCount, onAddVideo, onUpdateVideo, onDeleteVideo, onUpdateStat, openMenu, setOpenMenu, editingStat, setEditingStat }) {
      const campaignCount = videos.filter(v => v.link.trim() && v.type === 'campaign').length;
      const authenticCount = videos.filter(v => v.link.trim() && v.type === 'authentic').length;

      return (
        <div className="space-y-6">
          <div className={`relative overflow-hidden rounded-2xl bg-gradient-to-br ${account.gradient} p-6 shadow-2xl`} style={{ boxShadow: `0 0 40px ${account.glow}` }}>
            <div className="relative z-10 flex items-start justify-between flex-wrap gap-4">
              <div>
                <div className="text-xs uppercase tracking-widest text-black/60 mb-1 font-semibold">{account.label}</div>
                <h2 className="text-3xl font-bold mb-2 text-white drop-shadow-lg">@{account.name}</h2>
                <a href={account.url} target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-1.5 text-sm bg-black/25 hover:bg-black/40 backdrop-blur-sm px-3 py-1.5 rounded-full transition-colors text-white">
                  View on TikTok <I.External size={12} />
                </a>
              </div>
              <MonthSelector currentMonth={currentMonth} onPrev={onPrevMonth} onNext={onNextMonth} />
            </div>
            <div className="absolute -right-8 -top-8 w-40 h-40 bg-white/10 rounded-full" />
            <div className="absolute -right-16 -bottom-16 w-48 h-48 bg-white/5 rounded-full" />
          </div>

          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="This month" value={monthCount} icon={<I.Calendar size={16} />} accent={account.accent} subtitle="Videos posted" />
            <StatCard label="All time" value={allTimeCount} icon={<I.Film size={16} />} accent="#64748b" subtitle="Lifetime total" />
            <EditableStatCard label="Followers" value={stats.followers} icon={<I.Users size={16} />} accent="#a855f7" subtitle="This month" editing={editingStat === 'followers'} onEditStart={() => setEditingStat('followers')} onEditEnd={() => setEditingStat(null)} onSave={(v) => onUpdateStat('followers', v)} />
            <EditableStatCard label="Likes" value={stats.likes} icon={<I.Heart size={16} />} accent="#f59e0b" subtitle="This month" editing={editingStat === 'likes'} onEditStart={() => setEditingStat('likes')} onEditEnd={() => setEditingStat(null)} onSave={(v) => onUpdateStat('likes', v)} />
          </div>

          <div className="flex gap-3 flex-wrap">
            <div className="flex items-center gap-2 bg-violet-500/10 border border-violet-500/20 px-3 py-1.5 rounded-lg">
              <div className="w-2 h-2 rounded-full bg-violet-400" /><span className="text-sm text-violet-300"><span className="font-bold">{campaignCount}</span> Campaign</span>
            </div>
            <div className="flex items-center gap-2 bg-amber-500/10 border border-amber-500/20 px-3 py-1.5 rounded-lg">
              <div className="w-2 h-2 rounded-full bg-amber-400" /><span className="text-sm text-amber-300"><span className="font-bold">{authenticCount}</span> Authentic</span>
            </div>
          </div>

          <div className="bg-[#0e0e14] border border-white/10 rounded-xl overflow-hidden">
            <div className="px-5 py-4 border-b border-white/10 flex items-center justify-between">
              <h3 className="font-bold text-white">Videos · {formatMonthLabel(currentMonth)}</h3>
              <span className="text-xs text-slate-500">{videos.length} {videos.length === 1 ? 'entry' : 'entries'}</span>
            </div>
            <div className="hidden md:grid grid-cols-[1fr_140px_140px_40px] gap-3 px-5 py-2.5 bg-white/5 border-b border-white/10 text-xs font-semibold text-slate-500 uppercase tracking-wide">
              <div>Video link</div><div>Date</div><div>Type</div><div></div>
            </div>
            {videos.length === 0 ? (
              <div className="px-5 py-12 text-center">
                <div className={`inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br ${account.gradient} opacity-40 mb-3`}><I.Video size={28} className="text-white" /></div>
                <p className="text-slate-300 font-medium mb-1">No videos yet for this month</p>
                <p className="text-sm text-slate-500">Use Quick Add on the Dashboard, or add a row below</p>
              </div>
            ) : (
              <div className="divide-y divide-white/5">
                {videos.map(video => (
                  <VideoRow key={video.id} video={video} accent={account.accent} onUpdate={(f, v) => onUpdateVideo(video.id, f, v)} onDelete={() => onDeleteVideo(video.id)} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                ))}
              </div>
            )}
            <button onClick={onAddVideo} className="w-full px-5 py-3.5 flex items-center justify-center gap-2 text-sm font-medium text-slate-400 hover:text-white hover:bg-white/5 border-t border-white/10 transition-colors"><I.Plus size={16} /> New video row</button>
          </div>
        </div>
      );
    }

    function VideoRow({ video, accent, onUpdate, onDelete, openMenu, setOpenMenu }) {
      const menuId = `video-type-${video.id}`;
      const isMenuOpen = openMenu === menuId;
      const type = VIDEO_TYPES.find(t => t.id === video.type) || VIDEO_TYPES[1];
      const [localLink, setLocalLink] = useState(video.link);
      const [localDate, setLocalDate] = useState(video.date);
      useEffect(() => { setLocalLink(video.link); }, [video.link]);
      useEffect(() => { setLocalDate(video.date); }, [video.date]);

      return (
        <div className="grid grid-cols-1 md:grid-cols-[1fr_140px_140px_40px] gap-2 md:gap-3 px-5 py-3 hover:bg-white/5 transition-colors group">
          <div className="flex items-center gap-2">
            <input type="url" value={localLink} onChange={(e) => setLocalLink(e.target.value)} onBlur={() => localLink !== video.link && onUpdate('link', localLink)} placeholder="Paste TikTok video URL..."
              className="flex-1 min-w-0 px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-white/10 focus:border-amber-400/50 focus:bg-black/30 rounded-md outline-none text-slate-200 placeholder-slate-600 transition-all" />
            {localLink.trim() && <a href={localLink} target="_blank" rel="noopener noreferrer" className="p-1.5 text-slate-500 hover:text-amber-400 transition-colors"><I.External size={14} /></a>}
          </div>
          <input type="date" value={localDate} onChange={(e) => { setLocalDate(e.target.value); onUpdate('date', e.target.value); }}
            className="px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-white/10 focus:border-amber-400/50 focus:bg-black/30 rounded-md outline-none text-slate-300 transition-all" />
          <div className="relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={() => setOpenMenu(isMenuOpen ? null : menuId)} className={`w-full flex items-center justify-between gap-1.5 px-2.5 py-1.5 rounded-md text-sm font-medium border transition-colors ${type.bg} ${type.text} ${type.border} hover:opacity-80`}>
              <span className="flex items-center gap-1.5"><div className={`w-1.5 h-1.5 rounded-full ${type.dot}`} />{type.label}</span><I.ChevDown size={14} className="opacity-60" />
            </button>
            {isMenuOpen && (
              <div className="absolute z-20 top-full mt-1 left-0 right-0 min-w-[140px] bg-[#15151c] border border-white/10 rounded-lg shadow-2xl py-1 overflow-hidden">
                {VIDEO_TYPES.map(t => (
                  <button key={t.id} onClick={() => { onUpdate('type', t.id); setOpenMenu(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-white/5 transition-colors">
                    <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded ${t.bg} ${t.text} text-xs font-medium`}><div className={`w-1.5 h-1.5 rounded-full ${t.dot}`} />{t.label}</div>
                    {video.type === t.id && <I.Check size={14} className="text-slate-500 ml-auto" />}
                  </button>
                ))}
              </div>
            )}
          </div>
          <button onClick={onDelete} className="p-1.5 text-slate-600 hover:text-red-400 hover:bg-red-500/10 rounded-md transition-colors opacity-0 group-hover:opacity-100 md:justify-self-end self-center" aria-label="Delete"><I.Trash size={16} /></button>
        </div>
      );
    }

    // ====== BONUSES ======
    function BonusesView({ bonuses, currentMonth, totalEarned, totalReceived, totalPending, monthBonusTotal, monthBonusCount, onAdd, onUpdate, onDelete, openMenu, setOpenMenu }) {
      const receivedPct = totalEarned > 0 ? (totalReceived / totalEarned) * 100 : 0;
      return (
        <div className="space-y-6">
          <div>
            <h2 className="text-2xl font-bold tracking-tight text-white flex items-center gap-2"><I.Award size={24} className="text-amber-400" />Bonuses</h2>
            <p className="text-sm text-slate-500 mt-0.5">Track all your TikTok bonus payments</p>
          </div>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <StatCard label="Total earned" value={formatCurrency(totalEarned)} icon={<I.Dollar size={16} />} accent="#64748b" subtitle={`${bonuses.length} ${bonuses.length === 1 ? 'bonus' : 'bonuses'}`} />
            <StatCard label="Received" value={formatCurrency(totalReceived)} icon={<I.Check size={16} />} accent="#10b981" subtitle="Already paid" />
            <StatCard label="Pending" value={formatCurrency(totalPending)} icon={<I.Loader size={16} />} accent="#f59e0b" subtitle="Awaiting payment" />
            <StatCard label={formatMonthLabel(currentMonth)} value={formatCurrency(monthBonusTotal)} icon={<I.Calendar size={16} />} accent="#a855f7" subtitle={`${monthBonusCount} this month`} />
          </div>
          {totalEarned > 0 && (
            <div className="bg-[#0e0e14] border border-white/10 rounded-xl p-5">
              <div className="flex items-center justify-between mb-2">
                <span className="text-sm font-semibold text-slate-300">Payment progress</span>
                <span className="text-sm text-slate-500">{receivedPct.toFixed(1)}% received</span>
              </div>
              <div className="h-3 bg-white/5 rounded-full overflow-hidden">
                <div className="h-full bg-gradient-to-r from-emerald-500 to-teal-400 transition-all duration-700" style={{ width: `${receivedPct}%`, boxShadow: '0 0 12px rgba(16,185,129,0.5)' }} />
              </div>
              <div className="flex justify-between mt-2 text-xs text-slate-500"><span>{formatCurrency(totalReceived)} received</span><span>{formatCurrency(totalPending)} pending</span></div>
            </div>
          )}
          <div className="bg-[#0e0e14] border border-white/10 rounded-xl overflow-hidden">
            <div className="px-5 py-4 border-b border-white/10"><h3 className="font-bold text-white">All bonuses</h3></div>
            <div className="hidden md:grid grid-cols-[140px_140px_1fr_140px_40px] gap-3 px-5 py-2.5 bg-white/5 border-b border-white/10 text-xs font-semibold text-slate-500 uppercase tracking-wide">
              <div>Date received</div><div>Amount</div><div>Note</div><div>Status</div><div></div>
            </div>
            {bonuses.length === 0 ? (
              <div className="px-5 py-12 text-center">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 opacity-40 mb-3"><I.Award size={28} className="text-white" /></div>
                <p className="text-slate-300 font-medium mb-1">No bonuses yet</p><p className="text-sm text-slate-500">Click below to add your first bonus</p>
              </div>
            ) : (
              <div className="divide-y divide-white/5">
                {bonuses.map(bonus => (
                  <BonusRow key={bonus.id} bonus={bonus} onUpdate={(f, v) => onUpdate(bonus.id, f, v)} onDelete={() => onDelete(bonus.id)} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                ))}
              </div>
            )}
            <button onClick={onAdd} className="w-full px-5 py-3.5 flex items-center justify-center gap-2 text-sm font-medium text-slate-400 hover:text-white hover:bg-white/5 border-t border-white/10 transition-colors"><I.Plus size={16} /> New bonus</button>
          </div>
        </div>
      );
    }

    function BonusRow({ bonus, onUpdate, onDelete, openMenu, setOpenMenu }) {
      const menuId = `bonus-status-${bonus.id}`;
      const isMenuOpen = openMenu === menuId;
      const status = BONUS_STATUSES.find(s => s.id === bonus.status) || BONUS_STATUSES[0];
      const [localAmount, setLocalAmount] = useState(bonus.amount);
      const [localNote, setLocalNote] = useState(bonus.note || '');
      useEffect(() => { setLocalAmount(bonus.amount); }, [bonus.amount]);
      useEffect(() => { setLocalNote(bonus.note || ''); }, [bonus.note]);

      return (
        <div className="grid grid-cols-1 md:grid-cols-[140px_140px_1fr_140px_40px] gap-2 md:gap-3 px-5 py-3 hover:bg-white/5 transition-colors group">
          <input type="date" value={bonus.date} onChange={(e) => onUpdate('date', e.target.value)} className="px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-white/10 focus:border-amber-400/50 focus:bg-black/30 rounded-md outline-none text-slate-300 transition-all" />
          <div className="relative">
            <span className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none">$</span>
            <input type="number" step="0.01" value={localAmount} onChange={(e) => setLocalAmount(e.target.value)} onBlur={() => Number(localAmount) !== Number(bonus.amount) && onUpdate('amount', Number(localAmount) || 0)} placeholder="0.00"
              className="w-full pl-5 pr-2 py-1.5 text-sm font-medium bg-transparent border border-transparent hover:border-white/10 focus:border-amber-400/50 focus:bg-black/30 rounded-md outline-none text-slate-200 placeholder-slate-600 transition-all" />
          </div>
          <input type="text" value={localNote} onChange={(e) => setLocalNote(e.target.value)} onBlur={() => localNote !== bonus.note && onUpdate('note', localNote)} placeholder="Add a note (optional)..."
            className="px-2 py-1.5 text-sm bg-transparent border border-transparent hover:border-white/10 focus:border-amber-400/50 focus:bg-black/30 rounded-md outline-none text-slate-300 placeholder-slate-600 transition-all" />
          <div className="relative" onClick={(e) => e.stopPropagation()}>
            <button onClick={() => setOpenMenu(isMenuOpen ? null : menuId)} className={`w-full flex items-center justify-between gap-1.5 px-2.5 py-1.5 rounded-md text-sm font-medium border transition-colors ${status.bg} ${status.text} ${status.border} hover:opacity-80`}>
              <span className="flex items-center gap-1.5"><div className={`w-1.5 h-1.5 rounded-full ${status.dot}`} />{status.label}</span><I.ChevDown size={14} className="opacity-60" />
            </button>
            {isMenuOpen && (
              <div className="absolute z-20 top-full mt-1 left-0 right-0 min-w-[140px] bg-[#15151c] border border-white/10 rounded-lg shadow-2xl py-1 overflow-hidden">
                {BONUS_STATUSES.map(s => (
                  <button key={s.id} onClick={() => { onUpdate('status', s.id); setOpenMenu(null); }} className="w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-white/5 transition-colors">
                    <div className={`flex items-center gap-1.5 px-2 py-0.5 rounded ${s.bg} ${s.text} text-xs font-medium`}><div className={`w-1.5 h-1.5 rounded-full ${s.dot}`} />{s.label}</div>
                    {bonus.status === s.id && <I.Check size={14} className="text-slate-500 ml-auto" />}
                  </button>
                ))}
              </div>
            )}
          </div>
          <button onClick={onDelete} className="p-1.5 text-slate-600 hover:text-red-400 hover:bg-red-500/10 rounded-md transition-colors opacity-0 group-hover:opacity-100 md:justify-self-end self-center" aria-label="Delete"><I.Trash size={16} /></button>
        </div>
      );
    }

    // ====== ROOT ======
    function App() {
      const [configured, setConfigured] = useState(!!_initialConfig);
      const [session, setSession] = useState(null);
      const [checking, setChecking] = useState(!!_initialConfig);

      useEffect(() => {
        if (!configured || !supabaseClient) return;
        supabaseClient.auth.getSession().then(({ data: { session } }) => { setSession(session); setChecking(false); });
        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_e, session) => setSession(session));
        return () => subscription.unsubscribe();
      }, [configured]);

      const handleSignOut = async () => { await supabaseClient.auth.signOut(); setSession(null); };
      const handleResetConfig = () => { if (confirm('Reset connection settings? You will need to enter your URL and key again.')) { clearConfig(); window.location.reload(); } };

      if (!configured) return <SetupScreen onConfigured={() => { setConfigured(true); setChecking(true); }} />;
      if (checking) return <div className="min-h-screen flex items-center justify-center" style={{ background: '#050507' }}><I.Loader size={32} className="text-amber-400" /></div>;
      if (!session) return <AuthScreen onAuth={setSession} onResetConfig={handleResetConfig} />;
      return <Tracker session={session} onSignOut={handleSignOut} onResetConfig={handleResetConfig} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
