<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Board — Present Perfect Continuous</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:#000; min-height:100vh; padding:28px 18px 60px; color:#fff; }
.wrap { max-width:920px; margin:0 auto; }

.hero { background:radial-gradient(120% 120% at 80% 0%,#16161f,#0a0a10 60%,#000); border-radius:22px; padding:26px 36px; position:relative; overflow:hidden; margin-bottom:20px; text-align:center; border:1px solid rgba(255,255,255,0.06); }
.hero::before { content:''; position:absolute; top:-60px; left:-30px; width:200px; height:200px; border-radius:50%; background:rgba(34,211,238,0.12); filter:blur(20px); }
.hero::after { content:''; position:absolute; bottom:-60px; right:-30px; width:200px; height:200px; border-radius:50%; background:rgba(244,114,182,0.12); filter:blur(20px); }
.hero .tag { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#22D3EE; font-weight:700; margin-bottom:6px; position:relative; }
.hero h1 { font-family:'Fredoka One',cursive; font-size:30px; line-height:1.1; position:relative; }
.hero h1 span { color:#FBBF24; }
.hero p { font-size:14px; color:#9a9aa8; margin-top:8px; position:relative; }

.turnbar { display:flex; gap:12px; align-items:center; justify-content:center; margin-bottom:16px; }
.pchip { display:flex; align-items:center; gap:8px; padding:8px 18px; border-radius:30px; font-weight:800; font-size:15px; border:2px solid transparent; background:#15151d; color:#9a9aa8; transition:all 0.2s; }
.pchip .pdot { width:16px; height:16px; border-radius:50%; }
.pchip.active { color:#fff; }
.pchip.j.active { border-color:#22D3EE; box-shadow:0 0 18px rgba(34,211,238,0.4); }
.pchip.v.active { border-color:#F472B6; box-shadow:0 0 18px rgba(244,114,182,0.4); }

.board { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:18px; }
.cell { position:relative; aspect-ratio:1/1; border-radius:14px; background:#101018; border:1.5px solid #333; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:6px; }
.cnum { position:absolute; top:6px; left:9px; font-family:'Fredoka One',cursive; font-size:14px; }
.cic { font-size:26px; opacity:0.92; }
.cell.t-finish, .cell.t-start { background:#171712; }
.cell.t-bonus { background:#1a1608; }
.cell.t-swap { background:#16101c; }
.toks { position:absolute; bottom:6px; display:flex; gap:4px; }
.tok { width:18px; height:18px; border-radius:50%; border:2px solid #000; box-shadow:0 0 8px currentColor; }
.tok.j { background:#22D3EE; color:#22D3EE; }
.tok.v { background:#F472B6; color:#F472B6; }
.cell.land { animation:pop 0.4s ease; }
@keyframes pop { 0%{transform:scale(1);} 50%{transform:scale(1.12);} 100%{transform:scale(1);} }

.controls { display:flex; gap:14px; align-items:center; justify-content:center; margin-bottom:18px; flex-wrap:wrap; }
.diceBtn { font-family:'Fredoka One',cursive; font-size:20px; color:#000; background:linear-gradient(135deg,#FBBF24,#A3E635); border:none; border-radius:16px; padding:14px 40px; cursor:pointer; box-shadow:0 6px 20px rgba(251,191,36,0.3); transition:transform 0.1s; }
.diceBtn:hover { transform:translateY(-2px); }
.diceBtn:disabled { background:#2a2a30; color:#666; cursor:default; box-shadow:none; transform:none; }
.dice { width:60px; height:60px; border-radius:14px; background:#fff; color:#000; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:30px; box-shadow:0 4px 14px rgba(255,255,255,0.15); }
.btn-reset { font-family:'Nunito'; font-size:14px; font-weight:700; padding:11px 20px; border-radius:12px; cursor:pointer; background:#15151d; color:#9a9aa8; border:1px solid rgba(255,255,255,0.12); }
.btn-reset:hover { background:#1d1d26; }

.prompt { border-radius:18px; padding:24px 28px; text-align:center; border:2px solid #2a2a30; background:#101018; min-height:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:all 0.2s; }
.prompt .ptag { font-size:12px; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; padding:4px 14px; border-radius:20px; }
.prompt .ptxt { font-size:21px; font-weight:800; line-height:1.45; max-width:680px; }
.prompt .pwho { font-size:13px; color:#9a9aa8; margin-top:12px; }

.winbox { text-align:center; padding:20px; font-size:22px; font-weight:800; }
@media (max-width:560px){ .cic{font-size:20px;} .prompt .ptxt{font-size:18px;} }
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="tag">Speaking Game · B1</div>
    <h1>Speaking <span>Board</span> 🎲 — How long have you been…?</h1>
    <p>Player 1 vs Player 2! Roll, move, and do the speaking task. First to square 20 wins!</p>
  </div>

  <div class="turnbar">
    <div class="pchip j active" id="chip-j"><span class="pdot" style="background:#22D3EE"></span>Player 1</div>
    <span style="color:#555;font-weight:800;">VS</span>
    <div class="pchip v" id="chip-v"><span class="pdot" style="background:#F472B6"></span>Player 2</div>
  </div>

  <div class="board" id="board">
      <div class="cell t-start" id="cell-1" style="grid-row:1;grid-column:1;border-color:#A3E635;box-shadow:inset 0 0 0 1px #A3E63533;"><div class="cnum" style="color:#A3E635">1</div><div class="cic">🏁</div><div class="toks" id="tok-1"></div></div>
      <div class="cell t-prompt" id="cell-2" style="grid-row:1;grid-column:2;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">2</div><div class="cic">💬</div><div class="toks" id="tok-2"></div></div>
      <div class="cell t-prompt" id="cell-3" style="grid-row:1;grid-column:3;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">3</div><div class="cic">💬</div><div class="toks" id="tok-3"></div></div>
      <div class="cell t-bonus" id="cell-4" style="grid-row:1;grid-column:4;border-color:#FBBF24;box-shadow:inset 0 0 0 1px #FBBF2433;"><div class="cnum" style="color:#FBBF24">4</div><div class="cic">⭐</div><div class="toks" id="tok-4"></div></div>
      <div class="cell t-swap" id="cell-5" style="grid-row:1;grid-column:5;border-color:#A78BFA;box-shadow:inset 0 0 0 1px #A78BFA33;"><div class="cnum" style="color:#A78BFA">5</div><div class="cic">🔄</div><div class="toks" id="tok-5"></div></div>
      <div class="cell t-prompt" id="cell-6" style="grid-row:2;grid-column:5;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">6</div><div class="cic">💬</div><div class="toks" id="tok-6"></div></div>
      <div class="cell t-prompt" id="cell-7" style="grid-row:2;grid-column:4;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">7</div><div class="cic">⏱️</div><div class="toks" id="tok-7"></div></div>
      <div class="cell t-swap" id="cell-8" style="grid-row:2;grid-column:3;border-color:#A78BFA;box-shadow:inset 0 0 0 1px #A78BFA33;"><div class="cnum" style="color:#A78BFA">8</div><div class="cic">🔄</div><div class="toks" id="tok-8"></div></div>
      <div class="cell t-prompt" id="cell-9" style="grid-row:2;grid-column:2;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">9</div><div class="cic">💬</div><div class="toks" id="tok-9"></div></div>
      <div class="cell t-prompt" id="cell-10" style="grid-row:2;grid-column:1;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">10</div><div class="cic">💬</div><div class="toks" id="tok-10"></div></div>
      <div class="cell t-swap" id="cell-11" style="grid-row:3;grid-column:1;border-color:#A78BFA;box-shadow:inset 0 0 0 1px #A78BFA33;"><div class="cnum" style="color:#A78BFA">11</div><div class="cic">🔄</div><div class="toks" id="tok-11"></div></div>
      <div class="cell t-bonus" id="cell-12" style="grid-row:3;grid-column:2;border-color:#FBBF24;box-shadow:inset 0 0 0 1px #FBBF2433;"><div class="cnum" style="color:#FBBF24">12</div><div class="cic">⭐</div><div class="toks" id="tok-12"></div></div>
      <div class="cell t-prompt" id="cell-13" style="grid-row:3;grid-column:3;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">13</div><div class="cic">📱</div><div class="toks" id="tok-13"></div></div>
      <div class="cell t-prompt" id="cell-14" style="grid-row:3;grid-column:4;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">14</div><div class="cic">💬</div><div class="toks" id="tok-14"></div></div>
      <div class="cell t-swap" id="cell-15" style="grid-row:3;grid-column:5;border-color:#A78BFA;box-shadow:inset 0 0 0 1px #A78BFA33;"><div class="cnum" style="color:#A78BFA">15</div><div class="cic">🔄</div><div class="toks" id="tok-15"></div></div>
      <div class="cell t-prompt" id="cell-16" style="grid-row:4;grid-column:5;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">16</div><div class="cic">⏱️</div><div class="toks" id="tok-16"></div></div>
      <div class="cell t-prompt" id="cell-17" style="grid-row:4;grid-column:4;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">17</div><div class="cic">💬</div><div class="toks" id="tok-17"></div></div>
      <div class="cell t-swap" id="cell-18" style="grid-row:4;grid-column:3;border-color:#A78BFA;box-shadow:inset 0 0 0 1px #A78BFA33;"><div class="cnum" style="color:#A78BFA">18</div><div class="cic">🔄</div><div class="toks" id="tok-18"></div></div>
      <div class="cell t-prompt" id="cell-19" style="grid-row:4;grid-column:2;border-color:#22D3EE;box-shadow:inset 0 0 0 1px #22D3EE33;"><div class="cnum" style="color:#22D3EE">19</div><div class="cic">💬</div><div class="toks" id="tok-19"></div></div>
      <div class="cell t-finish" id="cell-20" style="grid-row:4;grid-column:1;border-color:#FBBF24;box-shadow:inset 0 0 0 1px #FBBF2433;"><div class="cnum" style="color:#FBBF24">20</div><div class="cic">🏆</div><div class="toks" id="tok-20"></div></div>
  </div>

  <div class="controls">
    <div class="dice" id="dice">🎲</div>
    <button class="diceBtn" id="rollBtn" onclick="roll()">ROLL!</button>
    <button class="btn-reset" onclick="resetGame()">↺ New game</button>
  </div>

  <div class="prompt" id="prompt">
    <div class="ptxt" style="color:#9a9aa8;">👆 Player 1 starts — press ROLL!</div>
  </div>

</div>

<script>
const PROMPTS = ["START — roll the dice to begin! 🎲", "How long have you been studying English? (use for / since)", "Tell us about a hobby you've been doing recently.", "BONUS! Say a sentence with 'for' — then roll again!", "Ask your partner: 'How long have you been living in your city?'", "What have you been doing this week? Tell us 3 things.", "Talk for 20 seconds about something you've been learning.", "SWAP! Your partner asks YOU a 'How long…?' question.", "Complete out loud: 'I've been … since this morning.'", "Why are you tired today? Answer: 'I've been …'", "Ask your partner about a series they've been watching.", "BONUS! Use 'since' in a sentence — move forward 1!", "How long have you been using your phone today? 😅", "Tell us about a skill you've been improving.", "Ask your partner: 'What have you been eating lately?'", "Talk for 20 seconds: a place you've been going to a lot.", "Complete: 'My best friend has been … for a long time.'", "Ask your partner: 'Have you been sleeping well? Why?'", "Say TWO sentences: one with 'for', one with 'since'.", "FINISH! 🎉 Tell us ONE thing you've enjoyed today!"];
const TYPES = ["start", "prompt", "prompt", "bonus", "swap", "prompt", "prompt", "swap", "prompt", "prompt", "swap", "bonus", "prompt", "prompt", "swap", "prompt", "prompt", "swap", "prompt", "finish"];
const TYPECOL = {start:'#A3E635',prompt:'#22D3EE',bonus:'#FBBF24',swap:'#A78BFA',finish:'#FBBF24'};
const TYPELABEL = {start:'Start',prompt:'Speak!',bonus:'Bonus ⭐',swap:'Ask your partner 🔄',finish:'Finish 🏆'};
const NAMES = {j:'Player 1', v:'Player 2'};
let pos = {j:1, v:1};
let cur = 'j';
let busy = false;
let over = false;

function renderTokens(){
  for(let i=1;i<=20;i++){ document.getElementById('tok-'+i).innerHTML=''; }
  ['j','v'].forEach(pl=>{
    const t=document.createElement('div'); t.className='tok '+pl;
    document.getElementById('tok-'+pos[pl]).appendChild(t);
  });
}
function setTurn(p){
  cur=p;
  document.getElementById('chip-j').classList.toggle('active', p==='j');
  document.getElementById('chip-v').classList.toggle('active', p==='v');
}
function roll(){
  if(busy||over) return;
  busy=true;
  document.getElementById('rollBtn').disabled=true;
  const r=1+Math.floor(Math.random()*6);
  const dice=document.getElementById('dice');
  // quick roll animation
  let ticks=0;
  const iv=setInterval(()=>{
    dice.textContent = (1+Math.floor(Math.random()*6));
    if(++ticks>8){ clearInterval(iv); dice.textContent=r; finishMove(r); }
  },70);
}
function finishMove(r){
  let np = pos[cur]+r;
  if(np>=20){ np=20; }
  pos[cur]=np;
  renderTokens();
  const cell=document.getElementById('cell-'+np);
  cell.classList.add('land'); setTimeout(()=>cell.classList.remove('land'),420);
  showPrompt(np);
  if(np===20){
    over=true;
    document.getElementById('rollBtn').disabled=true;
    document.getElementById('rollBtn').textContent='🏆 '+NAMES[cur]+' wins!';
    busy=false;
    return;
  }
  // switch turn
  setTurn(cur==='j'?'v':'j');
  document.getElementById('rollBtn').disabled=false;
  busy=false;
}
function showPrompt(i){
  const type=TYPES[i-1];
  const col=TYPECOL[type];
  const p=document.getElementById('prompt');
  p.style.borderColor=col;
  p.style.boxShadow='0 0 28px '+col+'22';
  const whoNext = (type==='swap') ? '' : '';
  p.innerHTML =
    '<div class="ptag" style="background:'+col+'22;color:'+col+'">'+TYPELABEL[type]+'</div>'+
    '<div class="ptxt">'+PROMPTS[i-1]+'</div>'+
    '<div class="pwho">'+ (over? '🎉 Great game!' : ('Now: '+NAMES[cur==='j'?'v':'j']+'\u2019s turn to roll')) +'</div>';
}
function resetGame(){
  pos={j:1,v:1}; cur='j'; busy=false; over=false;
  setTurn('j');
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('rollBtn').textContent='ROLL!';
  document.getElementById('dice').textContent='🎲';
  const p=document.getElementById('prompt');
  p.style.borderColor='#2a2a30'; p.style.boxShadow='none';
  p.innerHTML='<div class="ptxt" style="color:#9a9aa8;">👆 Player 1 starts — press ROLL!</div>';
  renderTokens();
}
renderTokens();
</script>
</body>
</html>
